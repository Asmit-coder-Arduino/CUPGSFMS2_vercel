<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Times New Roman,Georgia,serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="10" fill="#0f3460"/>
  <rect x="0" y="10" width="1240" height="4" fill="#e94560"/>
  <rect x="0" y="14" width="1240" height="56" fill="#0f3460"/>
  <rect x="0" y="70" width="1240" height="4" fill="#e94560"/>
  <text x="60" y="50" font-size="22" font-weight="800" fill="#ffffff">Chapter 2: Literature Review</text>

  <rect x="60" y="88" width="1120" height="30" rx="4" fill="#0f346015" stroke="#0f346040" stroke-width="1"/>
  <text x="72" y="108" font-size="13" font-weight="800" fill="#0f3460">2.1  Overview of Existing Academic Feedback Systems</text>
  <text x="80" y="130" font-size="12" fill="#374151" font-weight="normal">Several academic institutions worldwide have adopted digital feedback mechanisms to replace manual paper</text>
<text x="80" y="152" font-size="12" fill="#374151" font-weight="normal">systems. These systems range from generic survey platforms (Google Forms, SurveyMonkey) to purpose-built</text>
<text x="80" y="174" font-size="12" fill="#374151" font-weight="normal">academic feedback tools (ClassEval, CourseEval, EvaluationKIT). Each approach presents trade-offs</text>
<text x="80" y="196" font-size="12" fill="#374151" font-weight="normal">between flexibility, anonymity, analytics depth, and institutional integration.</text>

  <!-- Comparison Table -->
  <rect x="60" y="242" width="1120" height="30" rx="4" fill="#0f346015" stroke="#0f346040" stroke-width="1"/>
  <text x="72" y="262" font-size="13" font-weight="800" fill="#0f3460">2.2  Comparative Analysis of Existing Systems</text>
  <rect x="60" y="282" width="1120" height="34" fill="#0f3460"/><text x="70" y="304" font-size="13" fill="#ffffff" font-weight="700">System</text><line x1="320" y1="282" x2="320" y2="316" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="304" font-size="13" fill="#ffffff" font-weight="700">Anonymity</text><line x1="460" y1="282" x2="460" y2="316" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="304" font-size="13" fill="#ffffff" font-weight="700">Analytics</text><line x1="600" y1="282" x2="600" y2="316" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="304" font-size="13" fill="#ffffff" font-weight="700">Custom Forms</text><line x1="760" y1="282" x2="760" y2="316" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="304" font-size="13" fill="#ffffff" font-weight="700">PWA</text><line x1="860" y1="282" x2="860" y2="316" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="304" font-size="13" fill="#ffffff" font-weight="700">Cost</text><line x1="60" y1="316" x2="1180" y2="316" stroke="#d1d5db" stroke-width="0.8"/>
  <rect x="60" y="316" width="1120" height="34" fill="#f9fafb"/><text x="70" y="338" font-size="11" fill="#374151" font-weight="400">Google Forms</text><line x1="320" y1="316" x2="320" y2="350" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="338" font-size="11" fill="#374151" font-weight="400">Partial</text><line x1="460" y1="316" x2="460" y2="350" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="338" font-size="11" fill="#374151" font-weight="400">Basic</text><line x1="600" y1="316" x2="600" y2="350" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="338" font-size="11" fill="#374151" font-weight="400">Yes</text><line x1="760" y1="316" x2="760" y2="350" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="338" font-size="11" fill="#374151" font-weight="400">No</text><line x1="860" y1="316" x2="860" y2="350" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="338" font-size="11" fill="#374151" font-weight="400">Free</text><line x1="60" y1="350" x2="1180" y2="350" stroke="#d1d5db" stroke-width="0.8"/><rect x="60" y="350" width="1120" height="34" fill="white"/><text x="70" y="372" font-size="11" fill="#374151" font-weight="400">SurveyMonkey</text><line x1="320" y1="350" x2="320" y2="384" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="372" font-size="11" fill="#374151" font-weight="400">Configurable</text><line x1="460" y1="350" x2="460" y2="384" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="372" font-size="11" fill="#374151" font-weight="400">Limited</text><line x1="600" y1="350" x2="600" y2="384" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="372" font-size="11" fill="#374151" font-weight="400">Yes</text><line x1="760" y1="350" x2="760" y2="384" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="372" font-size="11" fill="#374151" font-weight="400">No</text><line x1="860" y1="350" x2="860" y2="384" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="372" font-size="11" fill="#374151" font-weight="400">Paid</text><line x1="60" y1="384" x2="1180" y2="384" stroke="#d1d5db" stroke-width="0.8"/><rect x="60" y="384" width="1120" height="34" fill="#f9fafb"/><text x="70" y="406" font-size="11" fill="#374151" font-weight="400">ClassEval (ERP)</text><line x1="320" y1="384" x2="320" y2="418" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="406" font-size="11" fill="#374151" font-weight="400">Variable</text><line x1="460" y1="384" x2="460" y2="418" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="406" font-size="11" fill="#374151" font-weight="400">Moderate</text><line x1="600" y1="384" x2="600" y2="418" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="406" font-size="11" fill="#374151" font-weight="400">No</text><line x1="760" y1="384" x2="760" y2="418" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="406" font-size="11" fill="#374151" font-weight="400">No</text><line x1="860" y1="384" x2="860" y2="418" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="406" font-size="11" fill="#374151" font-weight="400">Paid</text><line x1="60" y1="418" x2="1180" y2="418" stroke="#d1d5db" stroke-width="0.8"/><rect x="60" y="418" width="1120" height="34" fill="white"/><text x="70" y="440" font-size="11" fill="#374151" font-weight="400">Paper-based System</text><line x1="320" y1="418" x2="320" y2="452" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="440" font-size="11" fill="#374151" font-weight="400">None</text><line x1="460" y1="418" x2="460" y2="452" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="440" font-size="11" fill="#374151" font-weight="400">Manual Only</text><line x1="600" y1="418" x2="600" y2="452" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="440" font-size="11" fill="#374151" font-weight="400">Fixed</text><line x1="760" y1="418" x2="760" y2="452" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="440" font-size="11" fill="#374151" font-weight="400">N/A</text><line x1="860" y1="418" x2="860" y2="452" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="440" font-size="11" fill="#374151" font-weight="400">Low</text><line x1="60" y1="452" x2="1180" y2="452" stroke="#d1d5db" stroke-width="0.8"/><rect x="60" y="452" width="1120" height="34" fill="#0f346015"/><text x="70" y="474" font-size="13" fill="#0f3460" font-weight="700">CUPGS Feedback Mgr</text><line x1="320" y1="452" x2="320" y2="486" stroke="#d1d5db" stroke-width="0.8"/><text x="330" y="474" font-size="13" fill="#0f3460" font-weight="700">Guaranteed</text><line x1="460" y1="452" x2="460" y2="486" stroke="#d1d5db" stroke-width="0.8"/><text x="470" y="474" font-size="13" fill="#0f3460" font-weight="700">Real-time</text><line x1="600" y1="452" x2="600" y2="486" stroke="#d1d5db" stroke-width="0.8"/><text x="610" y="474" font-size="13" fill="#0f3460" font-weight="700">HOD-built</text><line x1="760" y1="452" x2="760" y2="486" stroke="#d1d5db" stroke-width="0.8"/><text x="770" y="474" font-size="13" fill="#0f3460" font-weight="700">Yes</text><line x1="860" y1="452" x2="860" y2="486" stroke="#d1d5db" stroke-width="0.8"/><text x="870" y="474" font-size="13" fill="#0f3460" font-weight="700">Free/Open</text><line x1="60" y1="486" x2="1180" y2="486" stroke="#d1d5db" stroke-width="0.8"/>
  <rect x="60" y="282" width="1120" height="204" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <rect x="60" y="504" width="1120" height="30" rx="4" fill="#0f346015" stroke="#0f346040" stroke-width="1"/>
  <text x="72" y="524" font-size="13" font-weight="800" fill="#0f3460">2.3  Key Gaps in Existing Solutions</text>
  <text x="80" y="546" font-size="12" fill="#374151" font-weight="normal">Based on the comparative analysis, the following key gaps were identified that motivated the development</text>
<text x="80" y="568" font-size="12" fill="#374151" font-weight="normal">of CUPGS Feedback Manager:</text>
  <circle cx="86" cy="587" r="4" fill="#e94560"/><text x="98" y="590" font-size="12" fill="#374151">No existing free solution offers guaranteed anonymity combined with real-time analytics and HOD</text><text x="98" y="610" font-size="12" fill="#374151">customizability in a single platform.</text><circle cx="86" cy="633" r="4" fill="#e94560"/><text x="98" y="636" font-size="12" fill="#374151">Generic tools like Google Forms do not enforce role-based access — anyone with a link can submit</text><text x="98" y="656" font-size="12" fill="#374151">responses.</text><circle cx="86" cy="679" r="4" fill="#e94560"/><text x="98" y="682" font-size="12" fill="#374151">ERP-integrated systems are expensive, often require vendor lock-in, and lack flexible UI</text><text x="98" y="702" font-size="12" fill="#374151">customization.</text><circle cx="86" cy="725" r="4" fill="#e94560"/><text x="98" y="728" font-size="12" fill="#374151">No existing academic-specific tool provides drag-based half-star ratings for fine-grained</text><text x="98" y="748" font-size="12" fill="#374151">precision.</text><circle cx="86" cy="771" r="4" fill="#e94560"/><text x="98" y="774" font-size="12" fill="#374151">None of the reviewed systems offer Admin-controlled time-bound feedback windows.</text>

  <rect x="60" y="800" width="1120" height="30" rx="4" fill="#0f346015" stroke="#0f346040" stroke-width="1"/>
  <text x="72" y="820" font-size="13" font-weight="800" fill="#0f3460">2.4  Relevant Technologies Reviewed</text>
  <text x="80" y="842" font-size="12" fill="#374151" font-weight="normal">The following technologies and frameworks were reviewed and evaluated before selecting the final</text>
<text x="80" y="864" font-size="12" fill="#374151" font-weight="normal">technology stack:</text>

  <rect x="60" y="866" width="1120" height="100" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="888" font-size="13" font-weight="700" fill="#0f3460">Frontend Framework</text>
    <text x="80" y="910" font-size="11" fill="#6b7280">Options Evaluated: React vs Vue vs Angular</text>
    <rect x="80" y="920" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="936" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: React 18</text>
    <text x="190" y="936" font-size="11" fill="#374151" font-weight="normal">Largest ecosystem, best TypeScript support, hooks-based state management, component reusability</text><rect x="60" y="978" width="1120" height="100" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="1000" font-size="13" font-weight="700" fill="#0f3460">CSS Framework</text>
    <text x="80" y="1022" font-size="11" fill="#6b7280">Options Evaluated: Tailwind vs Bootstrap vs MUI</text>
    <rect x="80" y="1032" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="1048" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: Tailwind CSS</text>
    <text x="190" y="1048" font-size="11" fill="#374151" font-weight="normal">Utility-first approach enables rapid UI development with consistent dark theme without custom</text>
<text x="190" y="1066" font-size="11" fill="#374151" font-weight="normal">CSS files</text><rect x="60" y="1090" width="1120" height="100" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="1112" font-size="13" font-weight="700" fill="#0f3460">Backend Framework</text>
    <text x="80" y="1134" font-size="11" fill="#6b7280">Options Evaluated: Express vs Fastify vs NestJS</text>
    <rect x="80" y="1144" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="1160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: Express.js</text>
    <text x="190" y="1160" font-size="11" fill="#374151" font-weight="normal">Minimal, well-documented, easiest integration with session management and rate limiting</text>
<text x="190" y="1178" font-size="11" fill="#374151" font-weight="normal">middleware</text><rect x="60" y="1202" width="1120" height="100" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="1224" font-size="13" font-weight="700" fill="#0f3460">Database</text>
    <text x="80" y="1246" font-size="11" fill="#6b7280">Options Evaluated: PostgreSQL vs MongoDB vs MySQL</text>
    <rect x="80" y="1256" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="1272" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: PostgreSQL</text>
    <text x="190" y="1272" font-size="11" fill="#374151" font-weight="normal">ACID compliance, native JSONB support for custom form data, real type for 0.5-precision ratings</text><rect x="60" y="1314" width="1120" height="100" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="1336" font-size="13" font-weight="700" fill="#0f3460">ORM</text>
    <text x="80" y="1358" font-size="11" fill="#6b7280">Options Evaluated: Drizzle vs Prisma vs TypeORM</text>
    <rect x="80" y="1368" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="1384" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: Drizzle ORM</text>
    <text x="190" y="1384" font-size="11" fill="#374151" font-weight="normal">Type-safe, schema-first, SQL-like queries, no magic — full control over generated SQL</text><rect x="60" y="1426" width="1120" height="100" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="1448" font-size="13" font-weight="700" fill="#0f3460">PDF Generation</text>
    <text x="80" y="1470" font-size="11" fill="#6b7280">Options Evaluated: Puppeteer vs wkhtmltopdf vs jsPDF</text>
    <rect x="80" y="1480" width="90" height="22" rx="3" fill="#0f3460"/>
    <text x="125" y="1496" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Chosen: jsPDF + html2canvas</text>
    <text x="190" y="1496" font-size="11" fill="#374151" font-weight="normal">Client-side generation requires no server-side Chrome instance; works in the browser directly</text>

  <rect x="60" y="1546" width="1120" height="30" rx="4" fill="#0f346015" stroke="#0f346040" stroke-width="1"/>
  <text x="72" y="1566" font-size="13" font-weight="800" fill="#0f3460">2.5  Standards and Methodologies Applied</text>
  <circle cx="86" cy="1585" r="4" fill="#0f3460"/><text x="98" y="1588" font-size="12" fill="#374151">Software Development Life Cycle (SDLC): Agile methodology with iterative development and</text><text x="98" y="1608" font-size="12" fill="#374151">continuous testing.</text><circle cx="86" cy="1631" r="4" fill="#0f3460"/><text x="98" y="1634" font-size="12" fill="#374151">Data Flow Diagrams (DFD): Yourdon-Coad notation for Level 0 (Context), Level 1, and Level 2</text><text x="98" y="1654" font-size="12" fill="#374151">process decomposition.</text><circle cx="86" cy="1677" r="4" fill="#0f3460"/><text x="98" y="1680" font-size="12" fill="#374151">Entity-Relationship (ER) Modeling: Chen's notation with Crow's Foot cardinality for database</text><text x="98" y="1700" font-size="12" fill="#374151">schema design.</text><circle cx="86" cy="1723" r="4" fill="#0f3460"/><text x="98" y="1726" font-size="12" fill="#374151">REST API Design: HTTP method semantics (GET, POST, PATCH, DELETE) with consistent JSON response</text><text x="98" y="1746" font-size="12" fill="#374151">format.</text><circle cx="86" cy="1769" r="4" fill="#0f3460"/><text x="98" y="1772" font-size="12" fill="#374151">OWASP Security Guidelines: Applied for input validation, session management, rate limiting, and</text><text x="98" y="1792" font-size="12" fill="#374151">error handling.</text><circle cx="86" cy="1815" r="4" fill="#0f3460"/><text x="98" y="1818" font-size="12" fill="#374151">COCOMO II: Used for effort and cost estimation in Chapter 7.</text>

  <rect x="0" y="1706" width="1240" height="48" fill="#0f3460"/>
  <line x1="0" y1="1706" x2="1240" y2="1706" stroke="#e94560" stroke-width="3"/>
  <text x="60" y="1736" font-size="11" fill="#94a3b8">CUPGS Academic Feedback Manager  |  Software Engineering Project Report</text>
  <text x="1180" y="1736" text-anchor="end" font-size="11" fill="#94a3b8">Page 5 of 16</text>
</svg>