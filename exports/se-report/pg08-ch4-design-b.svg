  <text x="72" y="80" font-size="13" font-weight="800" fill="#0f3460">4.4  Entity-Relationship (ER) Diagram</text>
  <text x="80" y="102" font-size="12" fill="#374151" font-weight="normal">The database consists of 6 entities: departments, faculty, courses, feedback, form_templates, and</text>
<text x="80" y="122" font-size="12" fill="#374151" font-weight="normal">feedback_windows. Notation: Chen's ER model with Crow's Foot cardinality. PK = Primary Key, FK = Foreign</text>
<text x="80" y="142" font-size="12" fill="#374151" font-weight="normal">Key.</text>

