    <text x="80" y="146" font-size="12" fill="#374151" font-weight="normal">[1] Pressman, R. S. and Maxim, B. R. (2014). &quot;Software Engineering: A Practitioner's Approach,&quot; 8th</text>
<text x="80" y="165" font-size="12" fill="#374151" font-weight="normal">Edition. McGraw-Hill Education.</text><rect x="60" y="184" width="1120" height="50" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="200" font-size="12" fill="#374151" font-weight="normal">[2] Sommerville, I. (2015). &quot;Software Engineering,&quot; 10th Edition. Pearson Education. (SDLC, SRS, Design</text>
<text x="80" y="219" font-size="12" fill="#374151" font-weight="normal">Patterns)</text><rect x="60" y="238" width="1120" height="50" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="254" font-size="12" fill="#374151" font-weight="normal">[3] Date, C. J. (2003). &quot;An Introduction to Database Systems,&quot; 8th Edition. Addison-Wesley. (Relational</text>
<text x="80" y="273" font-size="12" fill="#374151" font-weight="normal">DB, ER Diagrams)</text><rect x="60" y="292" width="1120" height="50" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
