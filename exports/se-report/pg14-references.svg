<text x="80" y="875" font-size="12" fill="#374151" font-weight="normal">https://tailwindcss.com/docs (Accessed 2024)</text><rect x="60" y="894" width="1120" height="50" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
