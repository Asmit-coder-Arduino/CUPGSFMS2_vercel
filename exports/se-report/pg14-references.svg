<text x="80" y="713" font-size="12" fill="#374151" font-weight="normal">(2021 Edition)</text><rect x="60" y="732" width="1120" height="50" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="748" font-size="12" fill="#374151" font-weight="normal">[11] Mozilla Developer Network. &quot;Progressive Web Apps (PWA) Guide.&quot; developer.mozilla.org. (Accessed 2024)</text><rect x="60" y="786" width="1120" height="50" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <text x="80" y="802" font-size="12" fill="#374151" font-weight="normal">[12] Boehm, B. W. (1981). &quot;Software Engineering Economics.&quot; Prentice-Hall. (COCOMO Model Reference)</text><rect x="60" y="840" width="1120" height="50" rx="4" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
