    <text x="80" y="1827" font-size="11" fill="#0f172a">View Own Course Ratings</text>
    <text x="382" y="1827" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1827" font-size="12" font-weight="700" fill="#14532d">YES</text><text x="790" y="1827" font-size="12" font-weight="700" fill="#14532d">YES</text><text x="994" y="1827" font-size="12" font-weight="700" fill="#14532d">YES</text><rect x="40" y="1838" width="1160" height="32" fill="#f8fafc"/>
    <text x="80" y="1859" font-size="11" fill="#0f172a">Department Analytics</text>
    <text x="382" y="1859" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1859" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="790" y="1859" font-size="12" font-weight="700" fill="#14532d">YES</text><text x="994" y="1859" font-size="12" font-weight="700" fill="#14532d">YES</text><rect x="40" y="1870" width="1160" height="32" fill="white"/>
    <text x="80" y="1891" font-size="11" fill="#0f172a">Download PDF Report</text>
    <text x="382" y="1891" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1891" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="790" y="1891" font-size="12" font-weight="700" fill="#14532d">YES</text><text x="994" y="1891" font-size="12" font-weight="700" fill="#14532d">YES</text><rect x="40" y="1902" width="1160" height="32" fill="#f8fafc"/>
    <text x="80" y="1923" font-size="11" fill="#0f172a">Custom Form Builder</text>
    <text x="382" y="1923" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1923" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="790" y="1923" font-size="12" font-weight="700" fill="#14532d">YES</text><text x="994" y="1923" font-size="12" font-weight="700" fill="#dc2626">NO</text><rect x="40" y="1934" width="1160" height="32" fill="white"/>
    <text x="80" y="1955" font-size="11" fill="#0f172a">Manage Courses / Faculty</text>
    <text x="382" y="1955" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1955" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="790" y="1955" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="994" y="1955" font-size="12" font-weight="700" fill="#14532d">YES</text><rect x="40" y="1966" width="1160" height="32" fill="#f8fafc"/>
    <text x="80" y="1987" font-size="11" fill="#0f172a">Control Feedback Windows</text>
    <text x="382" y="1987" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="586" y="1987" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="790" y="1987" font-size="12" font-weight="700" fill="#dc2626">NO</text><text x="994" y="1987" font-size="12" font-weight="700" fill="#14532d">YES</text>
