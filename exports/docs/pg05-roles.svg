    <text x="1086" y="186" text-anchor="middle" font-size="16" font-weight="800" fill="#7c2d12">ADMIN</text>

  <!-- Detailed role cards -->
  
    <rect x="40" y="226" width="1160" height="356" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="40" y="226" width="1160" height="44" rx="8" fill="#1e3a8a"/>
    <text x="60" y="254" font-size="20"></text>
    <text x="90" y="254" font-size="17" font-weight="800" fill="white">STUDENT ROLE</text>
    <text x="1180" y="254" text-anchor="end" font-size="12" fill="white">Login: CUPGS/DEPT/NNN  |  PIN: 4-digit PIN (default: 1234)</text>

    <text x="60" y="294" font-size="13" font-weight="700" fill="#1e3a8a">[OK] CAN DO:</text>
    <circle cx="68" cy="306" r="4" fill="#1e3a8a"/><text x="80" y="310" font-size="12" fill="#0f172a">Submit anonymous feedback for enrolled courses</text><circle cx="68" cy="338" r="4" fill="#1e3a8a"/><text x="80" y="342" font-size="12" fill="#0f172a">Drag-based half-star rating (0.5 to 5.0)</text><circle cx="68" cy="370" r="4" fill="#1e3a8a"/><text x="80" y="374" font-size="12" fill="#0f172a">Add text comments per category</text><circle cx="68" cy="402" r="4" fill="#1e3a8a"/><text x="80" y="406" font-size="12" fill="#0f172a">Answer HOD's custom questions</text><circle cx="68" cy="434" r="4" fill="#1e3a8a"/><text x="80" y="438" font-size="12" fill="#0f172a">Get unique Reference ID after submit</text>
    <line x1="630" y1="276" x2="630" y2="566" stroke="#bfdbfe" stroke-width="1"/>
    <text x="660" y="294" font-size="13" font-weight="700" fill="#dc2626">[NO] CANNOT DO:</text>
    <circle cx="668" cy="306" r="4" fill="#dc2626"/><text x="680" y="310" font-size="12" fill="#0f172a">See other students' feedback</text><circle cx="668" cy="338" r="4" fill="#dc2626"/><text x="680" y="342" font-size="12" fill="#0f172a">See faculty names in analytics</text><circle cx="668" cy="370" r="4" fill="#dc2626"/><text x="680" y="374" font-size="12" fill="#0f172a">Access HOD or Admin panels</text><circle cx="668" cy="402" r="4" fill="#dc2626"/><text x="680" y="406" font-size="12" fill="#0f172a">Submit feedback outside active windows</text>
    <rect x="40" y="598" width="1160" height="356" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <rect x="40" y="598" width="1160" height="44" rx="8" fill="#4c1d95"/>
    <text x="60" y="626" font-size="20"></text>
    <text x="90" y="626" font-size="17" font-weight="800" fill="white">FACULTY ROLE</text>
    <text x="1180" y="626" text-anchor="end" font-size="12" fill="white">Login: CUPGS/DEPT/NNN (same format)  |  PIN: 4-digit PIN</text>

    <text x="60" y="666" font-size="13" font-weight="700" fill="#4c1d95">[OK] CAN DO:</text>
    <circle cx="68" cy="678" r="4" fill="#4c1d95"/><text x="80" y="682" font-size="12" fill="#0f172a">View own course feedback analytics</text><circle cx="68" cy="710" r="4" fill="#4c1d95"/><text x="80" y="714" font-size="12" fill="#0f172a">See average ratings per category</text><circle cx="68" cy="742" r="4" fill="#4c1d95"/><text x="80" y="746" font-size="12" fill="#0f172a">See anonymous student comments</text><circle cx="68" cy="774" r="4" fill="#4c1d95"/><text x="80" y="778" font-size="12" fill="#0f172a">Compare own performance across semesters</text><circle cx="68" cy="806" r="4" fill="#4c1d95"/><text x="80" y="810" font-size="12" fill="#0f172a">View rating distribution charts</text>
