    <rect x="40" y="1342" width="1160" height="356" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <rect x="40" y="1342" width="1160" height="44" rx="8" fill="#7c2d12"/>
    <text x="60" y="1370" font-size="20"></text>
    <text x="90" y="1370" font-size="17" font-weight="800" fill="white">ADMIN ROLE</text>
    <text x="1180" y="1370" text-anchor="end" font-size="12" fill="white">Login: bput@admin2025  |  PIN: Admin password</text>

    <text x="60" y="1410" font-size="13" font-weight="700" fill="#7c2d12">[OK] CAN DO:</text>
    <circle cx="68" cy="1422" r="4" fill="#7c2d12"/><text x="80" y="1426" font-size="12" fill="#0f172a">Institution-wide analytics dashboard</text><circle cx="68" cy="1454" r="4" fill="#7c2d12"/><text x="80" y="1458" font-size="12" fill="#0f172a">All departments combined overview</text><circle cx="68" cy="1486" r="4" fill="#7c2d12"/><text x="80" y="1490" font-size="12" fill="#0f172a">Create/edit/delete departments</text><circle cx="68" cy="1518" r="4" fill="#7c2d12"/><text x="80" y="1522" font-size="12" fill="#0f172a">Manage courses (add, assign faculty)</text><circle cx="68" cy="1550" r="4" fill="#7c2d12"/><text x="80" y="1554" font-size="12" fill="#0f172a">Manage faculty records</text>
    <line x1="630" y1="1392" x2="630" y2="1682" stroke="#fecaca" stroke-width="1"/>
    <text x="660" y="1410" font-size="13" font-weight="700" fill="#dc2626">[NO] CANNOT DO:</text>
    <circle cx="668" cy="1422" r="4" fill="#dc2626"/><text x="680" y="1426" font-size="12" fill="#0f172a">See individual anonymous feedback content</text><circle cx="668" cy="1454" r="4" fill="#dc2626"/><text x="680" y="1458" font-size="12" fill="#0f172a">Override HOD's custom form for a dept</text>

  
