    <text x="1180" y="998" text-anchor="end" font-size="12" fill="white">Login: HOD/DEPT/001  |  PIN: DEPT@2025 (e.g., CSE@2025)</text>

    <text x="60" y="1038" font-size="13" font-weight="700" fill="#065f46">[OK] CAN DO:</text>
    <circle cx="68" cy="1050" r="4" fill="#065f46"/><text x="80" y="1054" font-size="12" fill="#0f172a">View entire department analytics dashboard</text><circle cx="68" cy="1082" r="4" fill="#065f46"/><text x="80" y="1086" font-size="12" fill="#0f172a">See per-course rating breakdown (5 categories)</text><circle cx="68" cy="1114" r="4" fill="#065f46"/><text x="80" y="1118" font-size="12" fill="#0f172a">Compare all courses in department</text><circle cx="68" cy="1146" r="4" fill="#065f46"/><text x="80" y="1150" font-size="12" fill="#0f172a">Download PDF report (one click)</text><circle cx="68" cy="1178" r="4" fill="#065f46"/><text x="80" y="1182" font-size="12" fill="#0f172a">Customize feedback form (add/remove questions)</text>
    <line x1="630" y1="1020" x2="630" y2="1310" stroke="#bbf7d0" stroke-width="1"/>
    <text x="660" y="1038" font-size="13" font-weight="700" fill="#dc2626">[NO] CANNOT DO:</text>
