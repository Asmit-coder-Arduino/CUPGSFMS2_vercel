<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">2. Problem Statement &amp; Solution Approach</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 3 of 10</text>

  
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">2.1. Problem Statement</text>
  <rect x="40" y="128" width="1160" height="180" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="60" y="156" font-size="14" font-weight="800" fill="#dc2626">Existing Problems at CUPGS Before This System:</text>
  <circle cx="68" cy="168" r="4" fill="#dc2626"/><text x="80" y="172" font-size="12" fill="#0f172a">Paper-based feedback forms were time-consuming to distribute, collect, and manually</text><text x="80" y="192" font-size="12" fill="#0f172a">aggregate</text><circle cx="68" cy="220" r="4" fill="#dc2626"/><text x="80" y="224" font-size="12" fill="#0f172a">Students had no anonymity guarantee on paper — fear of identification led to dishonest or</text><text x="80" y="244" font-size="12" fill="#0f172a">skipped responses</text><circle cx="68" cy="272" r="4" fill="#dc2626"/><text x="80" y="276" font-size="12" fill="#0f172a">HODs had to spend weeks manually tallying ratings and summarizing results — no real-time</text><text x="80" y="296" font-size="12" fill="#0f172a">insight</text><circle cx="68" cy="324" r="4" fill="#dc2626"/><text x="80" y="328" font-size="12" fill="#0f172a">No course-by-course or category-by-category comparison was possible — no trend data across</text><text x="80" y="348" font-size="12" fill="#0f172a">semesters</text><circle cx="68" cy="376" r="4" fill="#dc2626"/><text x="80" y="380" font-size="12" fill="#0f172a">One standardized form for all departments — HODs could not add department-specific custom</text><text x="80" y="400" font-size="12" fill="#0f172a">questions</text><circle cx="68" cy="428" r="4" fill="#dc2626"/><text x="80" y="432" font-size="12" fill="#0f172a">No control over when feedback could be submitted — open to abuse outside the intended</text><text x="80" y="452" font-size="12" fill="#0f172a">feedback period</text>

  
  <rect x="40" y="322" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="346" font-size="16" font-weight="800" fill="white">2.2. How CUPGS Feedback Manager Solves Each Problem</text>

  <rect x="40" y="366" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="388" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 1:</text>
    <text x="60" y="402" font-size="12" fill="#dc2626">Paper forms — no digitization</text>
    <text x="620" y="376" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="366" width="555" height="84" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="665" y="388" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="402" font-size="12" fill="#14532d">100% digital web-based form submission, stored instantly</text>
<text x="665" y="420" font-size="12" fill="#14532d">in PostgreSQL, accessible from any device</text><rect x="40" y="464" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="486" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 2:</text>
    <text x="60" y="500" font-size="12" fill="#dc2626">No anonymity — fear of identification</text>
    <text x="620" y="474" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="464" width="555" height="84" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="665" y="486" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="500" font-size="12" fill="#14532d">Reference ID system: only the student knows their code.</text>
<text x="665" y="518" font-size="12" fill="#14532d">Faculty and HODs cannot link a rating to a student</text><rect x="40" y="562" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="584" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 3:</text>
    <text x="60" y="598" font-size="12" fill="#dc2626">Manual aggregation takes weeks</text>
    <text x="620" y="572" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="562" width="555" height="84" rx="6" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="665" y="584" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="598" font-size="12" fill="#14532d">Real-time HOD dashboard with department analytics.</text>
<text x="665" y="616" font-size="12" fill="#14532d">One-click PDF report generation for download</text><rect x="40" y="660" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="682" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 4:</text>
    <text x="60" y="696" font-size="12" fill="#dc2626">No course-wise comparison possible</text>
    <text x="620" y="670" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="660" width="555" height="84" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="665" y="682" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="696" font-size="12" fill="#14532d">Per-course rating breakdown across 5 categories with</text>
<text x="665" y="714" font-size="12" fill="#14532d">averages, sorting, and semester history</text><rect x="40" y="758" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="780" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 5:</text>
    <text x="60" y="794" font-size="12" fill="#dc2626">One standard form for all departments</text>
    <text x="620" y="768" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="758" width="555" height="84" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="665" y="780" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="794" font-size="12" fill="#14532d">HOD form builder lets each HOD add custom text, rating,</text>
<text x="665" y="812" font-size="12" fill="#14532d">or multiple-choice questions for their dept</text><rect x="40" y="856" width="565" height="84" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="60" y="878" font-size="12" font-weight="700" fill="#dc2626">PROBLEM 6:</text>
    <text x="60" y="892" font-size="12" fill="#dc2626">No control over submission timing</text>
    <text x="620" y="866" text-anchor="middle" font-size="20" fill="#64748b">-&gt;</text>
    <rect x="645" y="856" width="555" height="84" rx="6" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
    <text x="665" y="878" font-size="12" font-weight="700" fill="#14532d">SOLUTION:</text>
    <text x="665" y="892" font-size="12" fill="#14532d">Admin creates time-bound feedback windows with start and</text>
<text x="665" y="910" font-size="12" fill="#14532d">end dates. Students cannot submit outside windows</text>

  
  <rect x="40" y="960" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="984" font-size="16" font-weight="800" fill="white">2.3. Unique Features Not Typically Found in Academic Feedback Systems</text>
  <rect x="40" y="1000" width="1160" height="280" rx="6" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1"/>

  <text x="56" y="1026" font-size="13" font-weight="700" fill="#1e3a8a">Half-Star Drag Rating</text>
    <text x="56" y="1042" font-size="11" fill="#64748b">Users drag to set ratings in 0.5 increments (0.5 to 5.0), not</text>
<text x="56" y="1060" font-size="11" fill="#64748b">just whole numbers. Designed for mouse and touch input.</text>
<text x="56" y="1078" font-size="11" fill="#64748b">Provides higher data precision than integer-only systems.</text><text x="646" y="1026" font-size="13" font-weight="700" fill="#1e3a8a">Reference ID Anonymity</text>
    <text x="646" y="1042" font-size="11" fill="#64748b">Each submission receives a unique ID formatted as</text>
<text x="646" y="1060" font-size="11" fill="#64748b">FB-YYYYMMDD-XXXXXX. Students verify their own response; nobody</text>
<text x="646" y="1078" font-size="11" fill="#64748b">else can use this ID to trace them. No student ID is ever</text>
<text x="646" y="1096" font-size="11" fill="#64748b">stored alongside feedback.</text><text x="56" y="1114" font-size="13" font-weight="700" fill="#1e3a8a">Live HOD Analytics</text>
    <text x="56" y="1130" font-size="11" fill="#64748b">HOD dashboard refreshes in real time. Shows department</text>
<text x="56" y="1148" font-size="11" fill="#64748b">average, per-course rating comparison by all 5 categories, top</text>
<text x="56" y="1166" font-size="11" fill="#64748b">and bottom performers, and trend data by semester.</text><text x="646" y="1114" font-size="13" font-weight="700" fill="#1e3a8a">HOD Form Builder</text>
    <text x="646" y="1130" font-size="11" fill="#64748b">HOD adds or removes custom questions directly from their</text>
<text x="646" y="1148" font-size="11" fill="#64748b">dashboard. Supported field types: short text, long text,</text>
<text x="646" y="1166" font-size="11" fill="#64748b">single-choice, and rating scale. Changes apply immediately to</text>
<text x="646" y="1184" font-size="11" fill="#64748b">the student feedback form.</text><text x="56" y="1202" font-size="13" font-weight="700" fill="#1e3a8a">Course-Faculty Integrity</text>
    <text x="56" y="1218" font-size="11" fill="#64748b">The server checks that the submitted course belongs to the</text>
<text x="56" y="1236" font-size="11" fill="#64748b">student's department and that the referenced faculty member is</text>
<text x="56" y="1254" font-size="11" fill="#64748b">actually assigned to that course, preventing fraudulent</text>
<text x="56" y="1272" font-size="11" fill="#64748b">cross-department submissions.</text><text x="646" y="1202" font-size="13" font-weight="700" fill="#1e3a8a">One-Click PDF Report</text>
    <text x="646" y="1218" font-size="11" fill="#64748b">HOD clicks 'Download Report' and receives a fully formatted</text>
<text x="646" y="1236" font-size="11" fill="#64748b">PDF with college header, semester info, all courses, category</text>
<text x="646" y="1254" font-size="11" fill="#64748b">ratings table, and averages. Generated entirely client-side</text>
<text x="646" y="1272" font-size="11" fill="#64748b">using jsPDF.</text>

  
  <rect x="40" y="1296" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1320" font-size="16" font-weight="800" fill="white">2.4. Feature Comparison: Traditional vs. CUPGS Feedback Manager</text>
  <rect x="40" y="1336" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="220" y="1359" text-anchor="middle" font-size="12" font-weight="700" fill="white">Feature</text>
  <text x="660" y="1359" text-anchor="middle" font-size="12" font-weight="700" fill="white">Traditional Paper System</text>
  <text x="1040" y="1359" text-anchor="middle" font-size="12" font-weight="700" fill="white">CUPGS Feedback Manager</text>
  <line x1="420" y1="1336" x2="420" y2="1714" stroke="#3b82f6" stroke-width="1"/>
  <line x1="840" y1="1336" x2="840" y2="1714" stroke="#3b82f6" stroke-width="1"/>

  <rect x="40" y="1372" width="1160" height="38" fill="#f8fafc"/>
    <text x="60" y="1396" font-size="11" font-weight="600" fill="#0f172a">Submission Method</text>
    <text x="440" y="1396" font-size="11" fill="#dc2626">X  Physical paper form + pen</text>
    <text x="860" y="1396" font-size="11" fill="#14532d">OK  Digital web form, any device or browser</text><rect x="40" y="1410" width="1160" height="38" fill="white"/>
    <text x="60" y="1434" font-size="11" font-weight="600" fill="#0f172a">Student Anonymity</text>
    <text x="440" y="1434" font-size="11" fill="#dc2626">X  None — handwriting is recognizable</text>
    <text x="860" y="1434" font-size="11" fill="#14532d">OK  Guaranteed — reference ID only, no name stored</text><rect x="40" y="1448" width="1160" height="38" fill="#f8fafc"/>
    <text x="60" y="1472" font-size="11" font-weight="600" fill="#0f172a">Result Availability</text>
    <text x="440" y="1472" font-size="11" fill="#dc2626">X  2-4 weeks of manual counting</text>
    <text x="860" y="1472" font-size="11" fill="#14532d">OK  Instant — real-time dashboard always current</text><rect x="40" y="1486" width="1160" height="38" fill="white"/>
    <text x="60" y="1510" font-size="11" font-weight="600" fill="#0f172a">Custom Questions</text>
    <text x="440" y="1510" font-size="11" fill="#dc2626">X  Requires reprinting all forms</text>
    <text x="860" y="1510" font-size="11" fill="#14532d">OK  HOD adds in 1 click from the dashboard</text><rect x="40" y="1524" width="1160" height="38" fill="#f8fafc"/>
    <text x="60" y="1548" font-size="11" font-weight="600" fill="#0f172a">Rating Granularity</text>
    <text x="440" y="1548" font-size="11" fill="#dc2626">X  1 to 5 whole numbers only</text>
    <text x="860" y="1548" font-size="11" fill="#14532d">OK  0.5 to 5.0 in drag-based half-star steps</text><rect x="40" y="1562" width="1160" height="38" fill="white"/>
    <text x="60" y="1586" font-size="11" font-weight="600" fill="#0f172a">Report Generation</text>
    <text x="440" y="1586" font-size="11" fill="#dc2626">X  Manual written or typed summary</text>
    <text x="860" y="1586" font-size="11" fill="#14532d">OK  Auto-generated PDF report with one click</text><rect x="40" y="1600" width="1160" height="38" fill="#f8fafc"/>
    <text x="60" y="1624" font-size="11" font-weight="600" fill="#0f172a">Access Timing Control</text>
    <text x="440" y="1624" font-size="11" fill="#dc2626">X  No restriction on timing</text>
    <text x="860" y="1624" font-size="11" fill="#14532d">OK  Admin-controlled windows with start/end dates</text><rect x="40" y="1638" width="1160" height="38" fill="white"/>
    <text x="60" y="1662" font-size="11" font-weight="600" fill="#0f172a">Data Storage</text>
    <text x="440" y="1662" font-size="11" fill="#dc2626">X  Physical files — risk of loss</text>
    <text x="860" y="1662" font-size="11" fill="#14532d">OK  PostgreSQL database — permanent and queryable</text><rect x="40" y="1676" width="1160" height="38" fill="#f8fafc"/>
    <text x="60" y="1700" font-size="11" font-weight="600" fill="#0f172a">Faculty Comparison</text>
    <text x="440" y="1700" font-size="11" fill="#dc2626">X  Difficult, requires manual work</text>
    <text x="860" y="1700" font-size="11" fill="#14532d">OK  Instant side-by-side course and category comparison</text>
  <rect x="40" y="1336" width="1160" height="378" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager  |  Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">3 / 10</text>
</svg>