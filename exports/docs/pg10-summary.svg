<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">9. Summary &amp; Future Scope</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 10 of 10</text>

  
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">9.1. Project Summary</text>
  <rect x="40" y="128" width="1160" height="160" rx="8" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="60" y="150" font-size="13" fill="#0f172a">CUPGS Academic Feedback Manager ek complete full-stack web application hai jo BPUT Rourkela ke CUPGS</text>
<text x="60" y="173" font-size="13" fill="#0f172a">department ke liye specially design kiya gaya hai. Iska main purpose hai ki students apne courses aur faculty</text>
<text x="60" y="196" font-size="13" fill="#0f172a">ke baare mein honest, anonymous feedback de sakein — bina kisi fear ke — aur HOD is data ko real-time</text>
<text x="60" y="219" font-size="13" fill="#0f172a">analytics aur professional PDF reports mein dekh sakein.</text>
  <text x="60" y="244" font-size="13" fill="#0f172a">System mein 4 roles hain — Student, Faculty, HOD, Admin. Har role ke liye alag dashboard aur permissions hain.</text>
<text x="60" y="267" font-size="13" fill="#0f172a">Data PostgreSQL mein securely store hota hai, aur anonymity guarantee ki gayi hai reference ID system se.</text>

  
  <rect x="40" y="306" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="330" font-size="16" font-weight="800" fill="white">9.2. What Was Achieved (Key Deliverables)</text>
  <rect x="40" y="346" width="1160" height="300" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <text x="56" y="376" font-size="13" font-weight="700" fill="#14532d">[OK] Anonymous Feedback System</text>
    <text x="56" y="394" font-size="11" fill="#64748b">Students kisi bhi device se feedback de sakte hain, 100% anonymously</text>
    <text x="636" y="376" font-size="13" font-weight="700" fill="#14532d">[OK] Half-Star Drag Rating</text>
    <text x="636" y="394" font-size="11" fill="#64748b">5 categories mein 0.5-step precise ratings — better data quality</text>
    <line x1="56" y1="404" x2="1184" y2="404" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="432" font-size="13" font-weight="700" fill="#14532d">[OK] Real-time HOD Dashboard</text>
    <text x="56" y="450" font-size="11" fill="#64748b">Department analytics, per-course comparison, instant visibility</text>
    <text x="636" y="432" font-size="13" font-weight="700" fill="#14532d">[OK] One-click PDF Reports</text>
    <text x="636" y="450" font-size="11" fill="#64748b">HOD ko manual work se mukti — complete PDF ek click mein</text>
    <line x1="56" y1="460" x2="1184" y2="460" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="488" font-size="13" font-weight="700" fill="#14532d">[OK] HOD Form Builder</text>
    <text x="56" y="506" font-size="11" fill="#64748b">Custom questions bina developer ke — HOD apne hisaab se form customize kar sakta hai</text>
    <text x="636" y="488" font-size="13" font-weight="700" fill="#14532d">[OK] Faculty-Course Integrity</text>
    <text x="636" y="506" font-size="11" fill="#64748b">Cross-department fraud prevent — system automatically validate karta hai</text>
    <line x1="56" y1="516" x2="1184" y2="516" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="544" font-size="13" font-weight="700" fill="#14532d">[OK] Admin Institution Control</text>
    <text x="56" y="562" font-size="11" fill="#64748b">Centralized management — departments, courses, faculty, windows sab ek jagah</text>
    <text x="636" y="544" font-size="13" font-weight="700" fill="#14532d">[OK] Feedback Window System</text>
    <text x="636" y="562" font-size="11" fill="#64748b">Time-controlled feedback collection — Admin ke haath mein complete control</text>
    <line x1="56" y1="572" x2="1184" y2="572" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="600" font-size="13" font-weight="700" fill="#14532d">[OK] Progressive Web App (PWA)</text>
    <text x="56" y="618" font-size="11" fill="#64748b">Installable, responsive, mobile-friendly — koi app store nahi chahiye</text>
    <text x="636" y="600" font-size="13" font-weight="700" fill="#14532d">[OK] Rate Limiting + Security</text>
    <text x="636" y="618" font-size="11" fill="#64748b">Production-grade security — brute force, DoS, SQL injection protection</text>
    

  
  <rect x="40" y="664" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="688" font-size="16" font-weight="800" fill="white">9.3. Future Scope &amp; Enhancements</text>
  <rect x="40" y="704" width="1160" height="240" rx="8" fill="#1e3a8a10" stroke="#1e3a8a40" stroke-width="1.5"/>
    <rect x="40" y="704" width="1160" height="36" rx="8" fill="#1e3a8a"/>
    <text x="60" y="728" font-size="14" font-weight="800" fill="white">Phase 2 — Short Term</text>
    <circle cx="68" cy="746" r="4" fill="#1e3a8a"/><text x="80" y="750" font-size="12" fill="#0f172a">Email notifications — HOD ko automatically report milegi semester end pe</text><circle cx="68" cy="778" r="4" fill="#1e3a8a"/><text x="80" y="782" font-size="12" fill="#0f172a">Graphical charts in PDF — bar charts, radar charts for visual comparison</text><circle cx="68" cy="810" r="4" fill="#1e3a8a"/><text x="80" y="814" font-size="12" fill="#0f172a">Student feedback history — apne purane submissions dekho (via Ref IDs)</text><circle cx="68" cy="842" r="4" fill="#1e3a8a"/><text x="80" y="846" font-size="12" fill="#0f172a">Multi-language support — Odia, Hindi mein bhi available ho</text><circle cx="68" cy="874" r="4" fill="#1e3a8a"/><text x="80" y="878" font-size="12" fill="#0f172a">Bulk course import — Excel se courses directly import karo</text><rect x="40" y="960" width="1160" height="240" rx="8" fill="#065f4610" stroke="#065f4640" stroke-width="1.5"/>
    <rect x="40" y="960" width="1160" height="36" rx="8" fill="#065f46"/>
    <text x="60" y="984" font-size="14" font-weight="800" fill="white">Phase 3 — Medium Term</text>
    <circle cx="68" cy="1002" r="4" fill="#065f46"/><text x="80" y="1006" font-size="12" fill="#0f172a">AI-powered sentiment analysis — comments pe automatic positive/negative tagging</text><circle cx="68" cy="1034" r="4" fill="#065f46"/><text x="80" y="1038" font-size="12" fill="#0f172a">Trend analysis — semester-over-semester performance graphs for faculty</text><circle cx="68" cy="1066" r="4" fill="#065f46"/><text x="80" y="1070" font-size="12" fill="#0f172a">Mobile app (React Native) — iOS aur Android native app</text><circle cx="68" cy="1098" r="4" fill="#065f46"/><text x="80" y="1102" font-size="12" fill="#0f172a">Comparison benchmarking — national/state level comparison with similar institutions</text><circle cx="68" cy="1130" r="4" fill="#065f46"/><text x="80" y="1134" font-size="12" fill="#0f172a">Automated action triggers — low rating pe HOD ko auto-alert system</text><rect x="40" y="1216" width="1160" height="240" rx="8" fill="#7c3aed10" stroke="#7c3aed40" stroke-width="1.5"/>
    <rect x="40" y="1216" width="1160" height="36" rx="8" fill="#7c3aed"/>
    <text x="60" y="1240" font-size="14" font-weight="800" fill="white">Phase 4 — Long Term</text>
    <circle cx="68" cy="1258" r="4" fill="#7c3aed"/><text x="80" y="1262" font-size="12" fill="#0f172a">Institution network — multiple colleges ek platform pe</text><circle cx="68" cy="1290" r="4" fill="#7c3aed"/><text x="80" y="1294" font-size="12" fill="#0f172a">NAAC/NIRF integration — feedback data directly NAAC reports ke liye exportable</text><circle cx="68" cy="1322" r="4" fill="#7c3aed"/><text x="80" y="1326" font-size="12" fill="#0f172a">Predictive analytics — ML model se at-risk courses early identify karo</text><circle cx="68" cy="1354" r="4" fill="#7c3aed"/><text x="80" y="1358" font-size="12" fill="#0f172a">Video feedback — students short video testimonials de sakein (anonymous)</text><circle cx="68" cy="1386" r="4" fill="#7c3aed"/><text x="80" y="1390" font-size="12" fill="#0f172a">Blockchain anonymity — on-chain proof of anonymity for ultimate trust</text>

  
  <rect x="40" y="1472" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1496" font-size="16" font-weight="800" fill="white">9.4. Technical Lessons &amp; Best Practices Used</text>
  <rect x="40" y="1512" width="1160" height="180" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="68" cy="1522" r="4" fill="#2563eb"/><text x="80" y="1526" font-size="12" fill="#0f172a">Monorepo structure (pnpm workspaces) — frontend aur backend ek sath manage</text><circle cx="68" cy="1554" r="4" fill="#2563eb"/><text x="80" y="1558" font-size="12" fill="#0f172a">Type safety end-to-end — TypeScript + Zod + Drizzle = zero runtime type errors in theory</text><circle cx="68" cy="1586" r="4" fill="#2563eb"/><text x="80" y="1590" font-size="12" fill="#0f172a">Separation of concerns — API routes, business logic, database layer alag-alag</text><circle cx="68" cy="1618" r="4" fill="#2563eb"/><text x="80" y="1622" font-size="12" fill="#0f172a">Security by default — rate limiting, session management, input validation from day 1</text><circle cx="68" cy="1650" r="4" fill="#2563eb"/><text x="80" y="1654" font-size="12" fill="#0f172a">DRY principle — shared types between frontend and backend</text><circle cx="68" cy="1682" r="4" fill="#2563eb"/><text x="80" y="1686" font-size="12" fill="#0f172a">Git-based version control — every feature is a checkpoint</text>

  <!-- Final Stats Banner -->
  <rect x="40" y="1710" width="1160" height="120" rx="12" fill="#1e3a8a"/>
  <text x="620" y="1740" text-anchor="middle" font-size="16" font-weight="800" fill="white">Project At A Glance</text>
  <rect x="80" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="140" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">6</text>
    <text x="140" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">DB Tables</text><rect x="222" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="282" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">10+</text>
    <text x="282" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">API Routes</text><rect x="364" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="424" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">4</text>
    <text x="424" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">User Roles</text><rect x="506" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="566" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">5</text>
    <text x="566" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">Departments</text><rect x="648" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="708" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">268+</text>
    <text x="708" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">Courses</text><rect x="790" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="850" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">5</text>
    <text x="850" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">Rating Types</text><rect x="932" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="992" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">100%</text>
    <text x="992" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">Anon.</text><rect x="1074" y="1754" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="1134" y="1784" text-anchor="middle" font-size="22" font-weight="900" fill="white">PWA</text>
    <text x="1134" y="1806" text-anchor="middle" font-size="10" fill="#93c5fd">Platform</text>

  <!-- End Banner -->
  <rect x="40" y="1848" width="1160" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="620" y="1880" text-anchor="middle" font-size="16" font-weight="800" fill="#14532d">— End of Project Documentation —</text>
  <text x="620" y="1904" text-anchor="middle" font-size="12" fill="#64748b">CUPGS Academic Feedback Manager · BPUT Rourkela · Academic Year 2024-25</text>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
