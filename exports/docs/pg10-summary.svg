<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">9. Summary &amp; Future Scope</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 10 of 10</text>

  
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">9.1. Project Summary</text>
  <rect x="40" y="128" width="1160" height="150" rx="8" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="60" y="150" font-size="12" fill="#0f172a">CUPGS Academic Feedback Manager is a complete full-stack web application built specifically for BPUT Rourkela's</text>
<text x="60" y="172" font-size="12" fill="#0f172a">CUPGS engineering departments. Its primary goal is to allow students to submit honest, anonymous feedback on their</text>
<text x="60" y="194" font-size="12" fill="#0f172a">courses and faculty — without fear of identification — and to give HODs immediate, actionable insights through a</text>
<text x="60" y="216" font-size="12" fill="#0f172a">real-time analytics dashboard and professional PDF reports.</text>
  <text x="60" y="242" font-size="12" fill="#0f172a">The system serves 4 distinct roles (Student, Faculty, HOD, Admin), enforces strict access boundaries, and stores</text>
<text x="60" y="264" font-size="12" fill="#0f172a">all data securely in a PostgreSQL database. Anonymity is guaranteed by architecture: student identity is never</text>
<text x="60" y="286" font-size="12" fill="#0f172a">stored alongside feedback records.</text>

  
  <rect x="40" y="290" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="314" font-size="16" font-weight="800" fill="white">9.2. Key Deliverables Achieved</text>
  <rect x="40" y="330" width="1160" height="310" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="56" y="358" font-size="13" font-weight="700" fill="#14532d">OK  Anonymous Feedback System</text>
    <text x="56" y="376" font-size="11" fill="#64748b">Students submit via any device with a guaranteed Reference ID — no name stored</text>
    <text x="636" y="358" font-size="13" font-weight="700" fill="#14532d">OK  Half-Star Drag Rating</text>
    <text x="636" y="376" font-size="11" fill="#64748b">5 categories rated from 0.5 to 5.0 in 0.5 steps — drag interaction, mouse and touch</text>
    <line x1="56" y1="386" x2="1184" y2="386" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="414" font-size="13" font-weight="700" fill="#14532d">OK  Real-Time HOD Dashboard</text>
    <text x="56" y="432" font-size="11" fill="#64748b">Department analytics with per-course rating breakdown, always up to date</text>
    <text x="636" y="414" font-size="13" font-weight="700" fill="#14532d">OK  One-Click PDF Report</text>
    <text x="636" y="432" font-size="11" fill="#64748b">HOD receives a fully formatted department report in seconds, no manual work</text>
    <line x1="56" y1="442" x2="1184" y2="442" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="470" font-size="13" font-weight="700" fill="#14532d">OK  HOD Form Builder</text>
    <text x="56" y="488" font-size="11" fill="#64748b">Custom question types (text, rating, choice) added without any developer involvement</text>
    <text x="636" y="470" font-size="13" font-weight="700" fill="#14532d">OK  Faculty-Course Integrity</text>
    <text x="636" y="488" font-size="11" fill="#64748b">Server-side validation prevents cross-department or fraudulent course submissions</text>
    <line x1="56" y1="498" x2="1184" y2="498" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="526" font-size="13" font-weight="700" fill="#14532d">OK  Admin Institution Control</text>
    <text x="56" y="544" font-size="11" fill="#64748b">Centralized management: departments, courses, faculty, windows — all in one panel</text>
    <text x="636" y="526" font-size="13" font-weight="700" fill="#14532d">OK  Feedback Window System</text>
    <text x="636" y="544" font-size="11" fill="#64748b">Time-controlled collection with date-bound windows that Admin opens and closes</text>
    <line x1="56" y1="554" x2="1184" y2="554" stroke="#e5e7eb" stroke-width="0.6"/><text x="56" y="582" font-size="13" font-weight="700" fill="#14532d">OK  Progressive Web App</text>
    <text x="56" y="600" font-size="11" fill="#64748b">Installable, responsive, splash screen, dark theme — works like a native app</text>
    <text x="636" y="582" font-size="13" font-weight="700" fill="#14532d">OK  Production-Grade Security</text>
    <text x="636" y="600" font-size="11" fill="#64748b">Rate limiting (3 layers), session management, Zod validation, no raw SQL exposure</text>
    

  
  <rect x="40" y="654" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="678" font-size="16" font-weight="800" fill="white">9.3. Future Scope &amp; Planned Enhancements</text>
  <rect x="40" y="694" width="1160" height="224" rx="8" fill="#1e3a8a10" stroke="#1e3a8a40" stroke-width="1.5"/>
    <rect x="40" y="694" width="1160" height="36" rx="8" fill="#1e3a8a"/>
    <text x="60" y="718" font-size="14" font-weight="800" fill="white">Phase 2 -- Short Term (next 3-6 months)</text>
    <circle cx="68" cy="736" r="4" fill="#1e3a8a"/><text x="80" y="740" font-size="12" fill="#0f172a">Email notifications: HODs receive automated semester-end reports by email</text><circle cx="68" cy="768" r="4" fill="#1e3a8a"/><text x="80" y="772" font-size="12" fill="#0f172a">Charts in PDF report: bar charts and radar charts for visual rating comparison</text><circle cx="68" cy="800" r="4" fill="#1e3a8a"/><text x="80" y="804" font-size="12" fill="#0f172a">Student feedback history: view all past submissions using saved Reference IDs</text><circle cx="68" cy="832" r="4" fill="#1e3a8a"/><text x="80" y="836" font-size="12" fill="#0f172a">Bulk course import: import courses from an Excel/CSV file instead of one by one</text><circle cx="68" cy="864" r="4" fill="#1e3a8a"/><text x="80" y="868" font-size="12" fill="#0f172a">Multi-language support: Odia and Hindi language options for wider accessibility</text><rect x="40" y="934" width="1160" height="224" rx="8" fill="#065f4610" stroke="#065f4640" stroke-width="1.5"/>
    <rect x="40" y="934" width="1160" height="36" rx="8" fill="#065f46"/>
    <text x="60" y="958" font-size="14" font-weight="800" fill="white">Phase 3 -- Medium Term (6-18 months)</text>
    <circle cx="68" cy="976" r="4" fill="#065f46"/><text x="80" y="980" font-size="12" fill="#0f172a">AI sentiment analysis: automatic positive/negative/neutral tagging on student comments</text><circle cx="68" cy="1008" r="4" fill="#065f46"/><text x="80" y="1012" font-size="12" fill="#0f172a">Semester trend graphs: visual performance tracking for faculty across multiple semesters</text><circle cx="68" cy="1040" r="4" fill="#065f46"/><text x="80" y="1044" font-size="12" fill="#0f172a">Mobile app: React Native version for iOS and Android with push notifications</text><circle cx="68" cy="1072" r="4" fill="#065f46"/><text x="80" y="1076" font-size="12" fill="#0f172a">Automated alerts: HOD receives auto-alert when a course rating drops below a threshold</text><circle cx="68" cy="1104" r="4" fill="#065f46"/><text x="80" y="1108" font-size="12" fill="#0f172a">Comparative benchmarking: compare department ratings against similar institutions</text><rect x="40" y="1174" width="1160" height="224" rx="8" fill="#7c3aed10" stroke="#7c3aed40" stroke-width="1.5"/>
    <rect x="40" y="1174" width="1160" height="36" rx="8" fill="#7c3aed"/>
    <text x="60" y="1198" font-size="14" font-weight="800" fill="white">Phase 4 -- Long Term (18+ months)</text>
    <circle cx="68" cy="1216" r="4" fill="#7c3aed"/><text x="80" y="1220" font-size="12" fill="#0f172a">Multi-institution network: extend the platform to cover multiple BPUT affiliated colleges</text><circle cx="68" cy="1248" r="4" fill="#7c3aed"/><text x="80" y="1252" font-size="12" fill="#0f172a">NAAC/NIRF integration: feedback data exportable in formats accepted by accreditation</text><text x="80" y="1272" font-size="12" fill="#0f172a">bodies</text><circle cx="68" cy="1300" r="4" fill="#7c3aed"/><text x="80" y="1304" font-size="12" fill="#0f172a">Predictive analytics: machine learning model to identify at-risk courses early in the</text><text x="80" y="1324" font-size="12" fill="#0f172a">semester</text><circle cx="68" cy="1352" r="4" fill="#7c3aed"/><text x="80" y="1356" font-size="12" fill="#0f172a">Blockchain-verified anonymity: on-chain proof of anonymity for maximum student trust</text><circle cx="68" cy="1384" r="4" fill="#7c3aed"/><text x="80" y="1388" font-size="12" fill="#0f172a">Faculty improvement plans: HOD can attach action items to low-rated courses, track</text><text x="80" y="1408" font-size="12" fill="#0f172a">resolution</text>

  
  <rect x="40" y="1418" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1442" font-size="16" font-weight="800" fill="white">9.4. Technical Best Practices Applied</text>
  <rect x="40" y="1458" width="1160" height="180" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="68" cy="1470" r="4" fill="#2563eb"/><text x="80" y="1474" font-size="12" fill="#0f172a">Monorepo architecture (pnpm workspaces) — frontend and backend co-located, shared types,</text><text x="80" y="1494" font-size="12" fill="#0f172a">single repository</text><circle cx="68" cy="1522" r="4" fill="#2563eb"/><text x="80" y="1526" font-size="12" fill="#0f172a">End-to-end type safety — TypeScript + Zod + Drizzle ORM eliminates an entire class of</text><text x="80" y="1546" font-size="12" fill="#0f172a">runtime type errors</text><circle cx="68" cy="1574" r="4" fill="#2563eb"/><text x="80" y="1578" font-size="12" fill="#0f172a">Separation of concerns — API route handlers, business logic, and database queries are kept</text><text x="80" y="1598" font-size="12" fill="#0f172a">in distinct layers</text><circle cx="68" cy="1626" r="4" fill="#2563eb"/><text x="80" y="1630" font-size="12" fill="#0f172a">Security by default — rate limiting, session management, and input validation are built in</text><text x="80" y="1650" font-size="12" fill="#0f172a">from day one, not added later</text><circle cx="68" cy="1678" r="4" fill="#2563eb"/><text x="80" y="1682" font-size="12" fill="#0f172a">Principle of least privilege — each user role has access to exactly the data and</text><text x="80" y="1702" font-size="12" fill="#0f172a">operations it needs, no more</text><circle cx="68" cy="1730" r="4" fill="#2563eb"/><text x="80" y="1734" font-size="12" fill="#0f172a">Git checkpoint-based version control — every major feature has a recoverable state that</text><text x="80" y="1754" font-size="12" fill="#0f172a">can be rolled back</text>

  <!-- Final Stats Banner -->
  <rect x="40" y="1654" width="1160" height="120" rx="12" fill="#1e3a8a"/>
  <text x="620" y="1684" text-anchor="middle" font-size="16" font-weight="800" fill="white">Project At A Glance</text>
  <rect x="80" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="140" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">6</text>
    <text x="140" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">DB Tables</text><rect x="222" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="282" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">10+</text>
    <text x="282" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">API Routes</text><rect x="364" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="424" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">4</text>
    <text x="424" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">User Roles</text><rect x="506" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="566" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">5</text>
    <text x="566" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">Departments</text><rect x="648" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="708" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">268+</text>
    <text x="708" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">Courses</text><rect x="790" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="850" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">5</text>
    <text x="850" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">Rating Cats.</text><rect x="932" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="992" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">100%</text>
    <text x="992" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">Anonymous</text><rect x="1074" y="1698" width="120" height="64" rx="6" fill="#ffffff15"/>
    <text x="1134" y="1728" text-anchor="middle" font-size="22" font-weight="900" fill="white">PWA</text>
    <text x="1134" y="1750" text-anchor="middle" font-size="10" fill="#93c5fd">Platform</text>

  <!-- End Banner -->
  <rect x="40" y="1788" width="1160" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="620" y="1820" text-anchor="middle" font-size="16" font-weight="800" fill="#14532d">-- End of Project Documentation --</text>
  <text x="620" y="1848" text-anchor="middle" font-size="12" fill="#64748b">CUPGS Academic Feedback Manager  |  BPUT Rourkela  |  Academic Year 2024-25</text>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager  |  Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">10 / 10</text>
</svg>