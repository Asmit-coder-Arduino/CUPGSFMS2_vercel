  <rect x="40" y="1750" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1774" font-size="16" font-weight="800" fill="white">6.3. PWA Features</text>
  <rect x="40" y="1790" width="1160" height="100" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="68" cy="1802" r="4" fill="#2563eb"/><text x="80" y="1806" font-size="12" fill="#0f172a">Installable on Android, iOS, Windows, and macOS via the browser's 'Add to Home Screen'</text><text x="80" y="1826" font-size="12" fill="#0f172a">prompt</text><circle cx="68" cy="1854" r="4" fill="#2563eb"/><text x="80" y="1858" font-size="12" fill="#0f172a">Fully responsive — tested from 320px mobile screens up to 4K desktop resolutions</text><circle cx="68" cy="1886" r="4" fill="#2563eb"/><text x="80" y="1890" font-size="12" fill="#0f172a">Custom splash screen on app launch with CUPGS branding and an animated loading indicator</text><circle cx="68" cy="1918" r="4" fill="#2563eb"/><text x="80" y="1922" font-size="12" fill="#0f172a">OLED-optimized dark theme reduces eye strain and improves battery life on AMOLED displays</text>

