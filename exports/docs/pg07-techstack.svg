  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">6. Technology Stack &amp; Design System</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 7 of 10</text>

  
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">6.1. Complete Technology Stack</text>

  <rect x="40" y="128" width="1160" height="336" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="40" y="128" width="1160" height="36" rx="4" fill="#1e3a8a20" stroke="#1e3a8a40" stroke-width="1"/>
    <text x="60" y="151" font-size="13" font-weight="800" fill="#1e3a8a">FRONTEND STACK</text>
    
      <rect x="56" y="174" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="white">React 18</text>
      <text x="200" y="190" font-size="11" fill="#64748b">Component-based UI library with hooks-based state management</text><line x1="56" y1="206" x2="1184" y2="206" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="210" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="white">TypeScript</text>
      <text x="200" y="226" font-size="11" fill="#64748b">Statically typed JavaScript — compile-time error detection across all files</text><line x1="56" y1="242" x2="1184" y2="242" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="246" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="white">Vite</text>
      <text x="200" y="262" font-size="11" fill="#64748b">Build tool with lightning-fast HMR and optimized production bundles</text><line x1="56" y1="278" x2="1184" y2="278" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="282" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="white">Tailwind CSS</text>
      <text x="200" y="298" font-size="11" fill="#64748b">Utility-first CSS framework for responsive dark-themed design</text><line x1="56" y1="314" x2="1184" y2="314" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="318" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="334" text-anchor="middle" font-size="11" font-weight="700" fill="white">shadcn/ui</text>
      <text x="200" y="334" font-size="11" fill="#64748b">Accessible component library: buttons, cards, dialogs, form inputs</text><line x1="56" y1="350" x2="1184" y2="350" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="354" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="white">React Query</text>
      <text x="200" y="370" font-size="11" fill="#64748b">Server state management: caching, background refetch, loading/error states</text><line x1="56" y1="386" x2="1184" y2="386" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="390" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="white">React Hook Form</text>
      <text x="200" y="406" font-size="11" fill="#64748b">Form state management with validation, error messages, and submit handling</text><line x1="56" y1="422" x2="1184" y2="422" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="426" width="130" height="24" rx="4" fill="#1e3a8a"/>
      <text x="121" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="white">jsPDF + html2canvas</text>
      <text x="200" y="442" font-size="11" fill="#64748b">Client-side PDF generation: HOD report is built in the browser on download</text><rect x="40" y="468" width="1160" height="300" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="40" y="468" width="1160" height="36" rx="4" fill="#14532d20" stroke="#14532d40" stroke-width="1"/>
    <text x="60" y="491" font-size="13" font-weight="800" fill="#14532d">BACKEND STACK</text>
    
      <rect x="56" y="514" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="530" text-anchor="middle" font-size="11" font-weight="700" fill="white">Node.js</text>
      <text x="200" y="530" font-size="11" fill="#64748b">JavaScript runtime with non-blocking I/O and event-driven architecture</text><line x1="56" y1="546" x2="1184" y2="546" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="550" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="566" text-anchor="middle" font-size="11" font-weight="700" fill="white">Express.js</text>
      <text x="200" y="566" font-size="11" fill="#64748b">HTTP server framework for routing, middleware chaining, and session handling</text><line x1="56" y1="582" x2="1184" y2="582" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="586" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="602" text-anchor="middle" font-size="11" font-weight="700" fill="white">TypeScript</text>
      <text x="200" y="602" font-size="11" fill="#64748b">Full type safety on the server, sharing types with the frontend codebase</text><line x1="56" y1="618" x2="1184" y2="618" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="622" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="638" text-anchor="middle" font-size="11" font-weight="700" fill="white">express-session</text>
      <text x="200" y="638" font-size="11" fill="#64748b">Server-side session management to maintain authentication state between requests</text><line x1="56" y1="654" x2="1184" y2="654" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="658" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="674" text-anchor="middle" font-size="11" font-weight="700" fill="white">express-rate-limit</text>
      <text x="200" y="674" font-size="11" fill="#64748b">API rate limiting: protects against brute-force attacks and request flooding</text><line x1="56" y1="690" x2="1184" y2="690" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="694" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="710" text-anchor="middle" font-size="11" font-weight="700" fill="white">Zod</text>
      <text x="200" y="710" font-size="11" fill="#64748b">Schema declaration and validation library — parses and validates all API inputs</text><line x1="56" y1="726" x2="1184" y2="726" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="730" width="130" height="24" rx="4" fill="#14532d"/>
      <text x="121" y="746" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pino</text>
      <text x="200" y="746" font-size="11" fill="#64748b">High-performance structured JSON logging for production-grade observability</text><rect x="40" y="808" width="1160" height="228" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="40" y="808" width="1160" height="36" rx="4" fill="#7c2d1220" stroke="#7c2d1240" stroke-width="1"/>
    <text x="60" y="831" font-size="13" font-weight="800" fill="#7c2d12">DATABASE STACK</text>
    
      <rect x="56" y="854" width="130" height="24" rx="4" fill="#7c2d12"/>
      <text x="121" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="white">PostgreSQL</text>
      <text x="200" y="870" font-size="11" fill="#64748b">Production-grade relational database: ACID compliant, JSON support, scalable</text><line x1="56" y1="886" x2="1184" y2="886" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="890" width="130" height="24" rx="4" fill="#7c2d12"/>
      <text x="121" y="906" text-anchor="middle" font-size="11" font-weight="700" fill="white">Drizzle ORM</text>
      <text x="200" y="906" font-size="11" fill="#64748b">Type-safe ORM with a schema-first approach and SQL-like query syntax</text><line x1="56" y1="922" x2="1184" y2="922" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="926" width="130" height="24" rx="4" fill="#7c2d12"/>
      <text x="121" y="942" text-anchor="middle" font-size="11" font-weight="700" fill="white">Drizzle Kit</text>
      <text x="200" y="942" font-size="11" fill="#64748b">Migration tooling: schema changes are pushed safely to the database</text><line x1="56" y1="958" x2="1184" y2="958" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="962" width="130" height="24" rx="4" fill="#7c2d12"/>
      <text x="121" y="978" text-anchor="middle" font-size="11" font-weight="700" fill="white">JSONB columns</text>
      <text x="200" y="978" font-size="11" fill="#64748b">Used for feedback.custom_answers and form_templates.fields for flexible storage</text><line x1="56" y1="994" x2="1184" y2="994" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="998" width="130" height="24" rx="4" fill="#7c2d12"/>
      <text x="121" y="1014" text-anchor="middle" font-size="11" font-weight="700" fill="white">real type</text>
      <text x="200" y="1014" font-size="11" fill="#64748b">Rating columns use PostgreSQL real (float) type to support 0.5 precision ratings</text><rect x="40" y="1148" width="1160" height="192" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="40" y="1148" width="1160" height="36" rx="4" fill="#4c1d9520" stroke="#4c1d9540" stroke-width="1"/>
    <text x="60" y="1171" font-size="13" font-weight="800" fill="#4c1d95">INFRASTRUCTURE &amp;AMP; TOOLING STACK</text>
    
      <rect x="56" y="1194" width="130" height="24" rx="4" fill="#4c1d95"/>
      <text x="121" y="1210" text-anchor="middle" font-size="11" font-weight="700" fill="white">Replit</text>
      <text x="200" y="1210" font-size="11" fill="#64748b">Cloud development and hosting platform; manages ports, secrets, and domains</text><line x1="56" y1="1226" x2="1184" y2="1226" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="1230" width="130" height="24" rx="4" fill="#4c1d95"/>
      <text x="121" y="1246" text-anchor="middle" font-size="11" font-weight="700" fill="white">pnpm workspaces</text>
      <text x="200" y="1246" font-size="11" fill="#64748b">Monorepo setup — api-server and bput-feedback as separate workspace packages</text><line x1="56" y1="1262" x2="1184" y2="1262" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="1266" width="130" height="24" rx="4" fill="#4c1d95"/>
      <text x="121" y="1282" text-anchor="middle" font-size="11" font-weight="700" fill="white">PWA</text>
      <text x="200" y="1282" font-size="11" fill="#64748b">Web App Manifest + Service Worker: installable on any device, no app store needed</text><line x1="56" y1="1298" x2="1184" y2="1298" stroke="#e5e7eb" stroke-width="0.5"/>
      <rect x="56" y="1302" width="130" height="24" rx="4" fill="#4c1d95"/>
      <text x="121" y="1318" text-anchor="middle" font-size="11" font-weight="700" fill="white">Environment Secrets</text>
      <text x="200" y="1318" font-size="11" fill="#64748b">SESSION_SECRET stored securely as a Replit environment variable, never in code</text>

  
  <rect x="40" y="1508" width="1160" height="36" rx="4" fill="#1e3a8a"/>
