<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">3. System Architecture &amp; Features</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 4 of 10</text>

  
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">3.1. Three-Tier Architecture</text>

  <rect x="40" y="128" width="1160" height="100" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="40" y="128" width="8" height="100" rx="4" fill="#2563eb"/>
  <text x="68" y="156" font-size="13" font-weight="800" fill="#2563eb">TIER 1 -- PRESENTATION LAYER (Frontend)</text>
  <text x="68" y="178" font-size="11" fill="#64748b">React 18 + TypeScript + Vite + Tailwind CSS + shadcn/ui components</text>
  <text x="68" y="196" font-size="11" fill="#64748b">Pages: Login  |  Submit Feedback  |  HOD Dashboard  |  Admin Panel  |  Faculty View</text>
  <text x="68" y="214" font-size="11" fill="#64748b">PWA: Installable, responsive, works on mobile and desktop browsers</text>

  <rect x="360" y="232" width="520" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="620" y="250" text-anchor="middle" font-size="12" fill="#64748b">[ REST API  --  HTTP/JSON via Axios ]</text>

  <rect x="40" y="264" width="1160" height="100" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="40" y="264" width="8" height="100" rx="4" fill="#14532d"/>
  <text x="68" y="292" font-size="13" font-weight="800" fill="#14532d">TIER 2 -- APPLICATION LAYER (Backend API)</text>
  <text x="68" y="312" font-size="11" fill="#64748b">Node.js + Express.js + TypeScript  |  Runs on PORT 8080</text>
  <text x="68" y="330" font-size="11" fill="#64748b">Routes: /api/auth  /api/feedback  /api/departments  /api/courses  /api/faculty  /api/windows</text>
  <text x="68" y="348" font-size="11" fill="#64748b">Middleware: Rate Limiting  |  Session Management  |  Input Validation (Zod)  |  Trust Proxy</text>

  <rect x="360" y="368" width="520" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="620" y="386" text-anchor="middle" font-size="12" fill="#64748b">[ Drizzle ORM  --  Type-safe SQL Queries ]</text>

  <rect x="40" y="400" width="1160" height="100" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="2"/>
  <rect x="40" y="400" width="8" height="100" rx="4" fill="#7c3aed"/>
  <text x="68" y="428" font-size="13" font-weight="800" fill="#7c3aed">TIER 3 -- DATA LAYER (Database)</text>
  <text x="68" y="448" font-size="11" fill="#64748b">PostgreSQL  |  6 Tables  |  Replit-managed database via DATABASE_URL</text>
  <text x="68" y="466" font-size="11" fill="#64748b">Tables: departments  courses  faculty  feedback  form_templates  feedback_windows</text>
  <text x="68" y="484" font-size="11" fill="#64748b">Notable: JSONB for custom answers, real type for 0.5-step rating precision</text>

  
  <rect x="40" y="514" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="538" font-size="16" font-weight="800" fill="white">3.2. Frontend Pages &amp; Routing</text>
  <rect x="40" y="554" width="1160" height="340" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="56" y="562" width="120" height="28" rx="4" fill="#1e3a8a"/>
    <text x="116" y="581" text-anchor="middle" font-size="10" font-weight="700" fill="white">/</text>
    <text x="190" y="580" font-size="13" font-weight="700" fill="#1e3a8a">Login Page</text>
    <text x="190" y="594" font-size="10" fill="#64748b">User selects their role (Student, Faculty, HOD, Admin), then enters ID and PIN. Successful auth redirects to</text>
<text x="190" y="610" font-size="10" fill="#64748b">the appropriate dashboard.</text><rect x="56" y="628" width="120" height="28" rx="4" fill="#14532d"/>
    <text x="116" y="647" text-anchor="middle" font-size="10" font-weight="700" fill="white">/submit-feedback</text>
    <text x="190" y="646" font-size="13" font-weight="700" fill="#1e3a8a">Submit Feedback</text>
    <text x="190" y="660" font-size="10" fill="#64748b">Student selects department and course, enters section and year, drags star ratings for 5 categories, adds</text>
<text x="190" y="676" font-size="10" fill="#64748b">optional comments, answers custom questions, and submits. Receives Reference ID on success.</text><rect x="56" y="694" width="120" height="28" rx="4" fill="#065f46"/>
    <text x="116" y="713" text-anchor="middle" font-size="10" font-weight="700" fill="white">/hod-dashboard</text>
    <text x="190" y="712" font-size="13" font-weight="700" fill="#1e3a8a">HOD Dashboard</text>
    <text x="190" y="726" font-size="10" fill="#64748b">HOD views department analytics, per-course rating table with 5-category breakdown, downloads PDF report,</text>
<text x="190" y="742" font-size="10" fill="#64748b">customizes feedback form, and checks feedback window status.</text><rect x="56" y="760" width="120" height="28" rx="4" fill="#7c2d12"/>
    <text x="116" y="779" text-anchor="middle" font-size="10" font-weight="700" fill="white">/admin</text>
    <text x="190" y="778" font-size="13" font-weight="700" fill="#1e3a8a">Admin Panel</text>
    <text x="190" y="792" font-size="10" fill="#64748b">Admin views institution-wide analytics for all 5 departments, manages courses and faculty records, creates</text>
<text x="190" y="808" font-size="10" fill="#64748b">and toggles feedback windows.</text><rect x="56" y="826" width="120" height="28" rx="4" fill="#4c1d95"/>
    <text x="116" y="845" text-anchor="middle" font-size="10" font-weight="700" fill="white">/faculty</text>
    <text x="190" y="844" font-size="13" font-weight="700" fill="#1e3a8a">Faculty View</text>
    <text x="190" y="858" font-size="10" fill="#64748b">Faculty sees performance data for their assigned courses: average ratings per category, anonymous student</text>
<text x="190" y="874" font-size="10" fill="#64748b">comments, and semester trends.</text>

  
  <rect x="40" y="906" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="930" font-size="16" font-weight="800" fill="white">3.3. API Endpoints Overview</text>
  <rect x="40" y="946" width="1160" height="36" rx="4" fill="#0f172a"/>
  <text x="148" y="969" text-anchor="middle" font-size="12" font-weight="700" fill="white">Method</text>
  <text x="410" y="969" text-anchor="middle" font-size="12" font-weight="700" fill="white">Endpoint</text>
  <text x="830" y="969" text-anchor="middle" font-size="12" font-weight="700" fill="white">Purpose</text>

  <rect x="40" y="982" width="1160" height="38" fill="#f8fafc"/>
    <rect x="56" y="989" width="65" height="24" rx="4" fill="#0284c7"/>
    <text x="88" y="1005" text-anchor="middle" font-size="11" font-weight="800" fill="white">POST</text>
    <text x="260" y="1006" font-size="11" font-weight="600" fill="#0f172a">/api/auth/login</text>
    <text x="640" y="1006" font-size="11" fill="#64748b">Login for all roles (Student, Faculty, HOD, Admin)</text><rect x="40" y="1020" width="1160" height="38" fill="white"/>
    <rect x="56" y="1027" width="65" height="24" rx="4" fill="#14532d"/>
    <text x="88" y="1043" text-anchor="middle" font-size="11" font-weight="800" fill="white">POST</text>
    <text x="260" y="1044" font-size="11" font-weight="600" fill="#0f172a">/api/feedback</text>
    <text x="640" y="1044" font-size="11" fill="#64748b">Submit anonymous student feedback</text><rect x="40" y="1058" width="1160" height="38" fill="#f8fafc"/>
    <rect x="56" y="1065" width="65" height="24" rx="4" fill="#14532d"/>
    <text x="88" y="1081" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1082" font-size="11" font-weight="600" fill="#0f172a">/api/feedback/check/:refId</text>
    <text x="640" y="1082" font-size="11" fill="#64748b">Verify own submission via Reference ID</text><rect x="40" y="1096" width="1160" height="38" fill="white"/>
    <rect x="56" y="1103" width="65" height="24" rx="4" fill="#7c3aed"/>
    <text x="88" y="1119" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1120" font-size="11" font-weight="600" fill="#0f172a">/api/departments/:id/hod-report</text>
    <text x="640" y="1120" font-size="11" fill="#64748b">Fetch HOD analytics data for department</text><rect x="40" y="1134" width="1160" height="38" fill="#f8fafc"/>
    <rect x="56" y="1141" width="65" height="24" rx="4" fill="#7c3aed"/>
    <text x="88" y="1157" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1158" font-size="11" font-weight="600" fill="#0f172a">/api/departments/:id/form-template</text>
    <text x="640" y="1158" font-size="11" fill="#64748b">Load custom feedback form template</text><rect x="40" y="1172" width="1160" height="38" fill="white"/>
    <rect x="56" y="1179" width="65" height="24" rx="4" fill="#7c3aed"/>
    <text x="88" y="1195" text-anchor="middle" font-size="11" font-weight="800" fill="white">POST</text>
    <text x="260" y="1196" font-size="11" font-weight="600" fill="#0f172a">/api/departments/:id/form-template</text>
    <text x="640" y="1196" font-size="11" fill="#64748b">Save HOD custom form configuration</text><rect x="40" y="1210" width="1160" height="38" fill="#f8fafc"/>
    <rect x="56" y="1217" width="65" height="24" rx="4" fill="#d97706"/>
    <text x="88" y="1233" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1234" font-size="11" font-weight="600" fill="#0f172a">/api/windows</text>
    <text x="640" y="1234" font-size="11" fill="#64748b">List all feedback windows (active status)</text><rect x="40" y="1248" width="1160" height="38" fill="white"/>
    <rect x="56" y="1255" width="65" height="24" rx="4" fill="#dc2626"/>
    <text x="88" y="1271" text-anchor="middle" font-size="11" font-weight="800" fill="white">POST</text>
    <text x="260" y="1272" font-size="11" font-weight="600" fill="#0f172a">/api/windows</text>
    <text x="640" y="1272" font-size="11" fill="#64748b">Admin: create a new feedback window</text><rect x="40" y="1286" width="1160" height="38" fill="#f8fafc"/>
    <rect x="56" y="1293" width="65" height="24" rx="4" fill="#dc2626"/>
    <text x="88" y="1309" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1310" font-size="11" font-weight="600" fill="#0f172a">/api/analytics/dashboard</text>
    <text x="640" y="1310" font-size="11" fill="#64748b">Admin: institution-wide analytics summary</text><rect x="40" y="1324" width="1160" height="38" fill="white"/>
    <rect x="56" y="1331" width="65" height="24" rx="4" fill="#475569"/>
    <text x="88" y="1347" text-anchor="middle" font-size="11" font-weight="800" fill="white">GET</text>
    <text x="260" y="1348" font-size="11" font-weight="600" fill="#0f172a">/api/courses</text>
    <text x="640" y="1348" font-size="11" fill="#64748b">List courses with assigned faculty info</text>
  <rect x="40" y="946" width="1160" height="416" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  
  <rect x="40" y="1368" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1392" font-size="16" font-weight="800" fill="white">3.4. Rate Limiting &amp; Security</text>
  <rect x="40" y="1408" width="1160" height="280" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  
    <text x="60" y="1436" font-size="12" font-weight="700" fill="#1e3a8a">[SEC] Session Management</text>
    <text x="290" y="1423" font-size="11" fill="#64748b">Server-side express-session with SESSION_SECRET stored as an environment secret. Only a session</text>
<text x="290" y="1440" font-size="11" fill="#64748b">cookie is stored in the browser — no passwords or tokens.</text><line x1="56" y1="1462" x2="1184" y2="1462" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="60" y="1480" font-size="12" font-weight="700" fill="#1e3a8a">[FAST] Rate Limiting (3 Layers)</text>
    <text x="290" y="1467" font-size="11" fill="#64748b">Global: 100 req/15 min per IP. Auth endpoint: 10 attempts/15 min. Feedback POST: 20</text>
<text x="290" y="1484" font-size="11" fill="#64748b">submissions/10 min. Trust proxy enabled for accurate IP detection.</text><line x1="56" y1="1506" x2="1184" y2="1506" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="60" y="1524" font-size="12" font-weight="700" fill="#1e3a8a">[OK] Input Validation</text>
    <text x="290" y="1511" font-size="11" fill="#64748b">Zod schema validation on every API route. Type checking, range enforcement, and required field</text>
<text x="290" y="1528" font-size="11" fill="#64748b">checks are applied server-side. Clear error messages are returned on invalid input.</text><line x1="56" y1="1550" x2="1184" y2="1550" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="60" y="1568" font-size="12" font-weight="700" fill="#1e3a8a">[LOCK] Anonymity Guarantee</text>
    <text x="290" y="1555" font-size="11" fill="#64748b">Student login ID is never stored in the feedback table. Only the generated Reference ID is</text>
<text x="290" y="1572" font-size="11" fill="#64748b">persisted. Even the database admin cannot link a feedback record to a student.</text><line x1="56" y1="1594" x2="1184" y2="1594" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="60" y="1612" font-size="12" font-weight="700" fill="#1e3a8a">[SHD] Faculty-Course Integrity</text>
    <text x="290" y="1599" font-size="11" fill="#64748b">Server verifies that the submitted course belongs to the student's department and that the</text>
<text x="290" y="1616" font-size="11" fill="#64748b">referenced faculty is assigned to that course. Cross-department submissions are rejected.</text><line x1="56" y1="1638" x2="1184" y2="1638" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="60" y="1656" font-size="12" font-weight="700" fill="#1e3a8a">[CAL] Window Enforcement</text>
    <text x="290" y="1643" font-size="11" fill="#64748b">Feedback window status is checked server-side on every submission. Even if the client-side check</text>
<text x="290" y="1660" font-size="11" fill="#64748b">is bypassed, the server rejects submissions outside active windows.</text>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager  |  Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">4 / 10</text>
</svg>