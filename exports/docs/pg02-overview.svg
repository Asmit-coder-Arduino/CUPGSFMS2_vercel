<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">1. Project Overview &amp; Objectives</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 2 of 10</text>

  <!-- Overview -->
  <rect x="40" y="92" width="1160" height="110" rx="8" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="60" y="118" font-size="14" font-weight="800" fill="#1e3a8a">What is CUPGS Feedback Manager?</text>
  <text x="60" y="135" font-size="12" fill="#0f172a">CUPGS Feedback Manager is a full-stack web application designed exclusively for the Centre for Urban and Planning</text>
<text x="60" y="156" font-size="12" fill="#0f172a">Graduate Studies (CUPGS) at BPUT Rourkela. It enables students to submit anonymous feedback on courses and faculty,</text>
<text x="60" y="177" font-size="12" fill="#0f172a">while providing Heads of Departments (HODs) with a real-time analytics dashboard and one-click PDF reports. The</text>
<text x="60" y="198" font-size="12" fill="#0f172a">system enforces strict role-based access and anonymity guarantees.</text>

  <!-- 3 columns -->
  <rect x="40"  y="216" width="368" height="220" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="436" y="216" width="368" height="220" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="832" y="216" width="368" height="220" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>

  <text x="224"  y="246" text-anchor="middle" font-size="13" font-weight="800" fill="#2563eb">WHAT IT IS</text>
  <text x="620"  y="246" text-anchor="middle" font-size="13" font-weight="800" fill="#14532d">WHO USES IT</text>
  <text x="1016" y="246" text-anchor="middle" font-size="13" font-weight="800" fill="#7c3aed">WHY IT WAS BUILT</text>

  <circle cx="64" cy="256" r="4" fill="#2563eb"/><text x="76" y="260" font-size="12" fill="#0f172a">Anonymous digital feedback system</text><circle cx="64" cy="288" r="4" fill="#2563eb"/><text x="76" y="292" font-size="12" fill="#0f172a">Drag-based half-star ratings (0.5 steps)</text><circle cx="64" cy="320" r="4" fill="#2563eb"/><text x="76" y="324" font-size="12" fill="#0f172a">HOD-customizable question forms</text><circle cx="64" cy="352" r="4" fill="#2563eb"/><text x="76" y="356" font-size="12" fill="#0f172a">Real-time analytics dashboard</text><circle cx="64" cy="384" r="4" fill="#2563eb"/><text x="76" y="388" font-size="12" fill="#0f172a">One-click PDF report generation</text><circle cx="64" cy="416" r="4" fill="#2563eb"/><text x="76" y="420" font-size="12" fill="#0f172a">Role-based access control (4 roles)</text>
  <circle cx="460" cy="256" r="4" fill="#14532d"/><text x="472" y="260" font-size="12" fill="#0f172a">Students — submit course feedback</text><circle cx="460" cy="288" r="4" fill="#14532d"/><text x="472" y="292" font-size="12" fill="#0f172a">Faculty — view own performance data</text><circle cx="460" cy="320" r="4" fill="#14532d"/><text x="472" y="324" font-size="12" fill="#0f172a">HOD — analytics + form customization</text><circle cx="460" cy="352" r="4" fill="#14532d"/><text x="472" y="356" font-size="12" fill="#0f172a">Admin — institution-wide management</text>
  <circle cx="856" cy="256" r="4" fill="#7c3aed"/><text x="868" y="260" font-size="12" fill="#0f172a">Replace paper-based feedback system</text><circle cx="856" cy="288" r="4" fill="#7c3aed"/><text x="868" y="292" font-size="12" fill="#0f172a">Guarantee student anonymity</text><circle cx="856" cy="320" r="4" fill="#7c3aed"/><text x="868" y="324" font-size="12" fill="#0f172a">Give HOD real-time actionable data</text><circle cx="856" cy="352" r="4" fill="#7c3aed"/><text x="868" y="356" font-size="12" fill="#0f172a">Track faculty performance over time</text><circle cx="856" cy="384" r="4" fill="#7c3aed"/><text x="868" y="388" font-size="12" fill="#0f172a">Improve transparency and trust</text>

  
  <rect x="40" y="450" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="474" font-size="16" font-weight="800" fill="white">1.1. Core Objectives</text>
  <rect x="40" y="490" width="1160" height="380" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="500" x2="1200" y2="500" stroke="#e5e7eb" stroke-width="0"/>
    <text x="64" y="518" font-size="13" font-weight="700" fill="#1e3a8a">Anonymous Feedback System</text>
    <text x="64" y="532" font-size="11" fill="#64748b">Students submit feedback without revealing their identity. A unique Reference ID (FB-YYYYMMDD-XXXXXX) is issued</text>
<text x="64" y="549" font-size="11" fill="#64748b">per submission. Faculty and HODs cannot identify which student gave which rating.</text><line x1="40" y1="562" x2="1200" y2="562" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="64" y="580" font-size="13" font-weight="700" fill="#1e3a8a">Half-Star Drag Rating</text>
    <text x="64" y="594" font-size="11" fill="#64748b">5 rating categories: Teaching Quality, Course Content, Lab Facilities, Study Material, and Overall. Each rated</text>
<text x="64" y="611" font-size="11" fill="#64748b">0.5 to 5.0 in 0.5 increments using a drag interaction. Works on mouse and touch.</text><line x1="40" y1="624" x2="1200" y2="624" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="64" y="642" font-size="13" font-weight="700" fill="#1e3a8a">HOD Analytics Dashboard</text>
    <text x="64" y="656" font-size="11" fill="#64748b">HOD sees department-wide analytics: total feedback count, average ratings per course, category breakdowns, top</text>
<text x="64" y="673" font-size="11" fill="#64748b">and bottom performing courses, and a downloadable PDF report.</text><line x1="40" y1="686" x2="1200" y2="686" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="64" y="704" font-size="13" font-weight="700" fill="#1e3a8a">Customizable Feedback Forms</text>
    <text x="64" y="718" font-size="11" fill="#64748b">HOD can add custom questions (text, rating, or multiple-choice) to their department's feedback form from within</text>
<text x="64" y="735" font-size="11" fill="#64748b">the dashboard. No developer required.</text><line x1="40" y1="748" x2="1200" y2="748" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="64" y="766" font-size="13" font-weight="700" fill="#1e3a8a">Faculty-Course Integrity Check</text>
    <text x="64" y="780" font-size="11" fill="#64748b">The system verifies that a student can only rate a course that belongs to their department and that the feedback</text>
<text x="64" y="797" font-size="11" fill="#64748b">references a validly assigned faculty member, preventing cross-department manipulation.</text><line x1="40" y1="810" x2="1200" y2="810" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="64" y="828" font-size="13" font-weight="700" fill="#1e3a8a">Admin-Controlled Feedback Windows</text>
    <text x="64" y="842" font-size="11" fill="#64748b">Admin creates time-bound feedback windows (with start and end dates). Students can only submit feedback when an</text>
<text x="64" y="859" font-size="11" fill="#64748b">active window is open. Windows can be global or department-specific.</text>

  
  <rect x="40" y="882" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="906" font-size="16" font-weight="800" fill="white">1.2. System Scope</text>
  <rect x="40" y="922" width="1160" height="130" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="946" font-size="13" font-weight="700" fill="#1e3a8a">IN SCOPE:</text>
  <circle cx="68" cy="954" r="4" fill="#2563eb"/><text x="80" y="958" font-size="12" fill="#0f172a">5 Engineering departments: CSE, ECE, EE, ME, CE</text><circle cx="68" cy="986" r="4" fill="#2563eb"/><text x="80" y="990" font-size="12" fill="#0f172a">Odd semester (July-October) and Even semester (November-June) feedback</text><circle cx="68" cy="1018" r="4" fill="#2563eb"/><text x="80" y="1022" font-size="12" fill="#0f172a">Academic year auto-detection based on current month (April = new year)</text><circle cx="68" cy="1050" r="4" fill="#2563eb"/><text x="80" y="1054" font-size="12" fill="#0f172a">Full audit trail via Reference IDs, no personally identifiable information stored</text>
  <text x="660" y="946" font-size="13" font-weight="700" fill="#dc2626">OUT OF SCOPE:</text>
  <circle cx="668" cy="954" r="4" fill="#dc2626"/><text x="680" y="958" font-size="12" fill="#0f172a">Examination or results management</text><circle cx="668" cy="986" r="4" fill="#dc2626"/><text x="680" y="990" font-size="12" fill="#0f172a">Attendance and fee management</text><circle cx="668" cy="1018" r="4" fill="#dc2626"/><text x="680" y="1022" font-size="12" fill="#0f172a">Hostel or library systems</text><circle cx="668" cy="1050" r="4" fill="#dc2626"/><text x="680" y="1054" font-size="12" fill="#0f172a">External university integrations</text>

  
  <rect x="40" y="1064" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1088" font-size="16" font-weight="800" fill="white">1.3. Key Metrics</text>
  <rect x="40" y="1104" width="180" height="90" rx="8" fill="#1e3a8a"/>
    <text x="130" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">268+</text>
    <text x="130" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">Total Courses</text><rect x="236" y="1104" width="180" height="90" rx="8" fill="#065f46"/>
    <text x="326" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">5</text>
    <text x="326" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">Departments</text><rect x="432" y="1104" width="180" height="90" rx="8" fill="#7c2d12"/>
    <text x="522" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">4</text>
    <text x="522" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">User Roles</text><rect x="628" y="1104" width="180" height="90" rx="8" fill="#4c1d95"/>
    <text x="718" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">5</text>
    <text x="718" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">Rating Cats.</text><rect x="824" y="1104" width="180" height="90" rx="8" fill="#0c4a6e"/>
    <text x="914" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">100%</text>
    <text x="914" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">Anonymous</text><rect x="1020" y="1104" width="180" height="90" rx="8" fill="#7c3aed"/>
    <text x="1110" y="1154" text-anchor="middle" font-size="28" font-weight="900" fill="white">0.5</text>
    <text x="1110" y="1180" text-anchor="middle" font-size="11" fill="#ffffff99">Rating Step</text>

  
  <rect x="40" y="1208" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1232" font-size="16" font-weight="800" fill="white">1.4. Login Credentials &amp; Academic Context</text>
  <rect x="40" y="1248" width="1160" height="440" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <text x="60" y="1274" font-size="13" font-weight="700" fill="#1e3a8a">Login Credential Formats:</text>
  <rect x="60" y="1286" width="100" height="34" rx="4" fill="#1e3a8a"/>
    <text x="110" y="1307" text-anchor="middle" font-size="12" font-weight="700" fill="white">Student</text>
    <text x="175" y="1307" font-size="12" fill="#0f172a">Login ID: <tspan font-weight="600">CUPGS/DEPT/NNN (e.g. CUPGS/CSE/042)</tspan></text>
    <text x="860" y="1307" font-size="12" fill="#64748b">Password: <tspan font-weight="600" fill="#0f172a">4-digit PIN (default: 1234)</tspan></text><rect x="60" y="1336" width="100" height="34" rx="4" fill="#4c1d95"/>
    <text x="110" y="1357" text-anchor="middle" font-size="12" font-weight="700" fill="white">Faculty</text>
    <text x="175" y="1357" font-size="12" fill="#0f172a">Login ID: <tspan font-weight="600">CUPGS/DEPT/NNN (e.g. CUPGS/CSE/101)</tspan></text>
    <text x="860" y="1357" font-size="12" fill="#64748b">Password: <tspan font-weight="600" fill="#0f172a">4-digit PIN</tspan></text><rect x="60" y="1386" width="100" height="34" rx="4" fill="#065f46"/>
    <text x="110" y="1407" text-anchor="middle" font-size="12" font-weight="700" fill="white">HOD</text>
    <text x="175" y="1407" font-size="12" fill="#0f172a">Login ID: <tspan font-weight="600">HOD/DEPT/001 (e.g. HOD/CSE/001)</tspan></text>
    <text x="860" y="1407" font-size="12" fill="#64748b">Password: <tspan font-weight="600" fill="#0f172a">DEPT@2025 (e.g. CSE@2025)</tspan></text><rect x="60" y="1436" width="100" height="34" rx="4" fill="#7c2d12"/>
    <text x="110" y="1457" text-anchor="middle" font-size="12" font-weight="700" fill="white">Admin</text>
    <text x="175" y="1457" font-size="12" fill="#0f172a">Login ID: <tspan font-weight="600">bput@admin2025</tspan></text>
    <text x="860" y="1457" font-size="12" fill="#64748b">Password: <tspan font-weight="600" fill="#0f172a">Admin password</tspan></text>

  <line x1="56" y1="1490" x2="1184" y2="1490" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="1514" font-size="13" font-weight="700" fill="#1e3a8a">Semester System:</text>
  <rect x="60" y="1522" width="520" height="52" rx="6" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="72" y="1542" font-size="12" font-weight="600" fill="#2563eb">ODD Semester (July - October)</text>
  <text x="72" y="1560" font-size="11" fill="#64748b">1st, 3rd, 5th, 7th semester courses. Feedback window opens in October.</text>
  <rect x="620" y="1522" width="560" height="52" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="632" y="1542" font-size="12" font-weight="600" fill="#14532d">EVEN Semester (November - June)</text>
  <text x="632" y="1560" font-size="11" fill="#64748b">2nd, 4th, 6th, 8th semester courses. Feedback window opens in June.</text>

  <text x="60" y="1598" font-size="13" font-weight="700" fill="#1e3a8a">Academic Year Calculation:</text>
  <rect x="60" y="1606" width="1100" height="48" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="80" y="1626" font-size="12" fill="#92400e">If current month is April or later (month &gt;= 4): Academic Year = currentYear-(currentYear+1)  e.g., 2025-26</text>
  <text x="80" y="1644" font-size="12" fill="#92400e">If current month is before April (Jan-Mar): Academic Year = (currentYear-1)-currentYear  e.g., 2024-25</text>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager  |  Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">2 / 10</text>
</svg>