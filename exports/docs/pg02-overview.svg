<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <!-- Header -->
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">1. Project Overview &amp; Objectives</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 2 of 10</text>

  <!-- Overview box -->
  <rect x="40" y="92" width="1160" height="120" rx="8" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="60" y="118" font-size="14" font-weight="800" fill="#1e3a8a">What is CUPGS Feedback Manager?</text>
  <text x="60" y="136" font-size="13" fill="#0f172a">CUPGS Feedback Manager ek full-stack web application hai jo BPUT Rourkela ke CUPGS (Centre for Urban &amp;</text>
<text x="60" y="158" font-size="13" fill="#0f172a">Planning Graduate Studies) ke liye banaya gaya hai. Yeh system students ko apne courses aur faculty ke baare</text>
<text x="60" y="180" font-size="13" fill="#0f172a">mein anonymous feedback dene ki suvidha deta hai, aur Heads of Departments (HODs) ko real-time analytics aur</text>
<text x="60" y="202" font-size="13" fill="#0f172a">PDF reports generate karne ki suvidha deta hai.</text>

  <!-- 3 Columns: What, Who, Why -->
  <rect x="40"   y="230" width="360" height="220" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="440"  y="230" width="360" height="220" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="840"  y="230" width="360" height="220" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>

  <text x="220"  y="260" text-anchor="middle" font-size="13" font-weight="800" fill="#2563eb"> KYA HAI (What)</text>
  <text x="620"  y="260" text-anchor="middle" font-size="13" font-weight="800" fill="#14532d"> KAUN USE KARTA HAI (Who)</text>
  <text x="1020" y="260" text-anchor="middle" font-size="13" font-weight="800" fill="#7c3aed"> KYUN BANAYA (Why)</text>

  <circle cx="64" cy="276" r="4" fill="#2563eb"/><text x="76" y="280" font-size="12" fill="#0f172a">Anonymous feedback system</text><circle cx="64" cy="308" r="4" fill="#2563eb"/><text x="76" y="312" font-size="12" fill="#0f172a">Drag-based half-star rating (0.5 steps)</text><circle cx="64" cy="340" r="4" fill="#2563eb"/><text x="76" y="344" font-size="12" fill="#0f172a">HOD-customizable question forms</text><circle cx="64" cy="372" r="4" fill="#2563eb"/><text x="76" y="376" font-size="12" fill="#0f172a">Real-time analytics dashboard</text><circle cx="64" cy="404" r="4" fill="#2563eb"/><text x="76" y="408" font-size="12" fill="#0f172a">PDF report generation</text><circle cx="64" cy="436" r="4" fill="#2563eb"/><text x="76" y="440" font-size="12" fill="#0f172a">Role-based access control</text>
  <circle cx="464" cy="276" r="4" fill="#14532d"/><text x="476" y="280" font-size="12" fill="#0f172a">Students — feedback submit karo</text><circle cx="464" cy="308" r="4" fill="#14532d"/><text x="476" y="312" font-size="12" fill="#0f172a">Faculty — apna performance dekho</text><circle cx="464" cy="340" r="4" fill="#14532d"/><text x="476" y="344" font-size="12" fill="#0f172a">HOD — analytics + form customize</text><circle cx="464" cy="372" r="4" fill="#14532d"/><text x="476" y="376" font-size="12" fill="#0f172a">Admin — pura system manage karo</text>
  <circle cx="864" cy="276" r="4" fill="#7c3aed"/><text x="876" y="280" font-size="12" fill="#0f172a">Manual paper feedback se hata</text><circle cx="864" cy="308" r="4" fill="#7c3aed"/><text x="876" y="312" font-size="12" fill="#0f172a">Anonymous hone se honest feedback</text><circle cx="864" cy="340" r="4" fill="#7c3aed"/><text x="876" y="344" font-size="12" fill="#0f172a">HOD ko real data milta hai</text><circle cx="864" cy="372" r="4" fill="#7c3aed"/><text x="876" y="376" font-size="12" fill="#0f172a">Faculty improvement track hota hai</text><circle cx="864" cy="404" r="4" fill="#7c3aed"/><text x="876" y="408" font-size="12" fill="#0f172a">Transparency badti hai</text>

  
  <rect x="40" y="470" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="494" font-size="16" font-weight="800" fill="white">1.1. Core Objectives</text>
  <rect x="40" y="510" width="1160" height="360" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="64"  y="538" font-size="20"></text>
    <text x="96"  y="534" font-size="13" font-weight="700" fill="#1e3a8a">Anonymous Feedback</text>
    <text x="96" y="548" font-size="11" fill="#64748b">Students apna feedback bina naam bataye de sakte hain. Reference ID se track kar sakte hain lekin faculty/HOD</text>
<text x="96" y="566" font-size="11" fill="#64748b">identify nahi kar sakta.</text><text x="64"  y="596" font-size="20"></text>
    <text x="96"  y="592" font-size="13" font-weight="700" fill="#1e3a8a">Half-Star Ratings</text>
    <text x="96" y="606" font-size="11" fill="#64748b">Drag-based rating system 0.5 increment mein — 0.5 se 5.0 tak. Teaching Quality, Course Content, Lab</text>
<text x="96" y="624" font-size="11" fill="#64748b">Facilities, Study Material, Overall.</text><text x="64"  y="654" font-size="20"></text>
    <text x="96"  y="650" font-size="13" font-weight="700" fill="#1e3a8a">HOD Analytics Dashboard</text>
    <text x="96" y="664" font-size="11" fill="#64748b">HOD apne department ke sab courses ki ratings dekh sakta hai, trends compare kar sakta hai, aur professional</text>
<text x="96" y="682" font-size="11" fill="#64748b">PDF report download kar sakta hai.</text><text x="64"  y="712" font-size="20"></text>
    <text x="96"  y="708" font-size="13" font-weight="700" fill="#1e3a8a">Customizable Feedback Forms</text>
    <text x="96" y="722" font-size="11" fill="#64748b">HOD apne department ke liye custom questions add kar sakta hai — text, rating, ya multiple choice. Yeh</text>
<text x="96" y="740" font-size="11" fill="#64748b">standard questions ke saath milke show hote hain.</text><text x="64"  y="770" font-size="20"></text>
    <text x="96"  y="766" font-size="13" font-weight="700" fill="#1e3a8a">Faculty-Course Integrity</text>
    <text x="96" y="780" font-size="11" fill="#64748b">System ensure karta hai ki feedback sirf us course ke assigned faculty ke liye diya jaye. Cross-department</text>
<text x="96" y="798" font-size="11" fill="#64748b">manipulation prevent hota hai.</text><text x="64"  y="828" font-size="20"></text>
    <text x="96"  y="824" font-size="13" font-weight="700" fill="#1e3a8a">Feedback Window Control</text>
    <text x="96" y="838" font-size="11" fill="#64748b">Admin specific time periods ke liye feedback windows khol aur band kar sakta hai. Window band hone pe feedback</text>
<text x="96" y="856" font-size="11" fill="#64748b">submit nahi hoga.</text>

  
  <rect x="40" y="888" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="912" font-size="16" font-weight="800" fill="white">1.2. System Scope</text>
  <rect x="40" y="928" width="1160" height="140" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="952" font-size="13" font-weight="700" fill="#1e3a8a">IN SCOPE:</text>
  <circle cx="68" cy="960" r="4" fill="#2563eb"/><text x="80" y="964" font-size="12" fill="#0f172a">5 Engineering departments — CSE, ECE, EE, ME, CE</text><circle cx="68" cy="992" r="4" fill="#2563eb"/><text x="80" y="996" font-size="12" fill="#0f172a">Odd semester (July–Oct) aur Even semester (Nov–June) feedback</text><circle cx="68" cy="1024" r="4" fill="#2563eb"/><text x="80" y="1028" font-size="12" fill="#0f172a">Academic year auto-calculation (April = new year start)</text><circle cx="68" cy="1056" r="4" fill="#2563eb"/><text x="80" y="1060" font-size="12" fill="#0f172a">Complete audit trail with reference IDs</text>
  <text x="660" y="952" font-size="13" font-weight="700" fill="#dc2626">OUT OF SCOPE:</text>
  <circle cx="668" cy="960" r="4" fill="#dc2626"/><text x="680" y="964" font-size="12" fill="#0f172a">Online examination system</text><circle cx="668" cy="992" r="4" fill="#dc2626"/><text x="680" y="996" font-size="12" fill="#0f172a">Attendance management</text><circle cx="668" cy="1024" r="4" fill="#dc2626"/><text x="680" y="1028" font-size="12" fill="#0f172a">Fee payment portal</text><circle cx="668" cy="1056" r="4" fill="#dc2626"/><text x="680" y="1060" font-size="12" fill="#0f172a">Result management system</text>

  
  <rect x="40" y="1086" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1110" font-size="16" font-weight="800" fill="white">1.3. Key Performance Indicators</text>
  <rect x="40" y="1126" width="180" height="90" rx="8" fill="#1e3a8a" stroke="none"/>
    <text x="130" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">268+</text>
    <text x="130" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">Courses</text><rect x="236" y="1126" width="180" height="90" rx="8" fill="#065f46" stroke="none"/>
    <text x="326" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">5</text>
    <text x="326" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">Departments</text><rect x="432" y="1126" width="180" height="90" rx="8" fill="#7c2d12" stroke="none"/>
    <text x="522" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">4</text>
    <text x="522" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">User Roles</text><rect x="628" y="1126" width="180" height="90" rx="8" fill="#4c1d95" stroke="none"/>
    <text x="718" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">5+</text>
    <text x="718" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">Rating Categories</text><rect x="824" y="1126" width="180" height="90" rx="8" fill="#0c4a6e" stroke="none"/>
    <text x="914" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">100%</text>
    <text x="914" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">Anonymous</text><rect x="1020" y="1126" width="180" height="90" rx="8" fill="#7c3aed" stroke="none"/>
    <text x="1110" y="1172" text-anchor="middle" font-size="28" font-weight="900" fill="white">0.5</text>
    <text x="1110" y="1200" text-anchor="middle" font-size="11" fill="#ffffff99">Rating Steps</text>

  
  <rect x="40" y="1234" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1258" font-size="16" font-weight="800" fill="white">1.4. Academic Context</text>
  <rect x="40" y="1274" width="1160" height="420" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <text x="60" y="1300" font-size="13" font-weight="700" fill="#1e3a8a">Semester System:</text>
  <rect x="60" y="1308" width="520" height="56" rx="6" fill="#f0f4ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="70" y="1328" font-size="12" font-weight="600" fill="#2563eb">ODD Semester (July – October)</text>
  <text x="70" y="1348" font-size="11" fill="#64748b">1st, 3rd, 5th, 7th semester courses — feedback window opens October</text>
  <rect x="620" y="1308" width="560" height="56" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="630" y="1328" font-size="12" font-weight="600" fill="#14532d">EVEN Semester (November – June)</text>
  <text x="630" y="1348" font-size="11" fill="#64748b">2nd, 4th, 6th, 8th semester courses — feedback window opens June</text>

  <text x="60" y="1390" font-size="13" font-weight="700" fill="#1e3a8a">Academic Year Calculation:</text>
  <rect x="60" y="1398" width="1100" height="50" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="80" y="1420" font-size="12" fill="#92400e">If current month >= April (month ≥ 4)  Academic Year = currentYear – (currentYear+1)  e.g., "2025-26"</text>
  <text x="80" y="1438" font-size="12" fill="#92400e">If current month &lt; April (Jan-Mar)  Academic Year = (currentYear-1) – currentYear  e.g., "2024-25"</text>

  <text x="60" y="1474" font-size="13" font-weight="700" fill="#1e3a8a">Login Credentials Format:</text>
  <rect x="60" y="1490" width="100" height="34" rx="4" fill="#1e3a8a"/>
    <text x="110" y="1511" text-anchor="middle" font-size="12" font-weight="700" fill="white">Student</text>
    <text x="175" y="1511" font-size="12" fill="#0f172a">ID: <tspan font-weight="600">CUPGS/DEPT/NNN (e.g. CUPGS/CSE/042)</tspan></text>
    <text x="800" y="1511" font-size="12" fill="#64748b">PIN/Pass: <tspan font-weight="600" fill="#0f172a">1234 (PIN)</tspan></text><rect x="60" y="1538" width="100" height="34" rx="4" fill="#4c1d95"/>
    <text x="110" y="1559" text-anchor="middle" font-size="12" font-weight="700" fill="white">Faculty</text>
    <text x="175" y="1559" font-size="12" fill="#0f172a">ID: <tspan font-weight="600">CUPGS/DEPT/NNN (e.g. CUPGS/CSE/101)</tspan></text>
    <text x="800" y="1559" font-size="12" fill="#64748b">PIN/Pass: <tspan font-weight="600" fill="#0f172a">1234 (PIN)</tspan></text><rect x="60" y="1586" width="100" height="34" rx="4" fill="#065f46"/>
    <text x="110" y="1607" text-anchor="middle" font-size="12" font-weight="700" fill="white">HOD</text>
    <text x="175" y="1607" font-size="12" fill="#0f172a">ID: <tspan font-weight="600">HOD/DEPT/001 (e.g. HOD/CSE/001)</tspan></text>
    <text x="800" y="1607" font-size="12" fill="#64748b">PIN/Pass: <tspan font-weight="600" fill="#0f172a">DEPT@2025 (e.g. CSE@2025)</tspan></text><rect x="60" y="1634" width="100" height="34" rx="4" fill="#7c2d12"/>
    <text x="110" y="1655" text-anchor="middle" font-size="12" font-weight="700" fill="white">Admin</text>
    <text x="175" y="1655" font-size="12" fill="#0f172a">ID: <tspan font-weight="600">bput@admin2025</tspan></text>
    <text x="800" y="1655" font-size="12" fill="#64748b">PIN/Pass: <tspan font-weight="600" fill="#0f172a">Admin password</tspan></text>

  <!-- Footer -->
  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager — Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">2 / 10</text>
</svg>