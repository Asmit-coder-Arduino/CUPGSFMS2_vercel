<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="Arial,Helvetica,sans-serif">
  <rect width="1240" height="1754" fill="white"/>
  <rect x="0" y="0" width="1240" height="72" fill="#1e3a8a"/>
  <text x="60" y="32" font-size="13" fill="#93c5fd">CUPGS Academic Feedback Management System</text>
  <text x="60" y="54" font-size="20" font-weight="800" fill="white">5. Module-wise Explanation</text>
  <text x="1180" y="42" text-anchor="end" font-size="12" fill="#93c5fd">Page 6 of 10</text>

  
    
  <rect x="40" y="88" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="112" font-size="16" font-weight="800" fill="white">5.1. Authentication Module</text>
    <rect x="40" y="128" width="1160" height="358" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="64" y="156" font-size="14" font-weight="700" fill="#1e3a8a">Authentication Module</text>
    <text x="64" y="172" font-size="12" fill="#64748b">Handles all user authentication with role detection and session management.</text>
    <line x1="56" y1="196" x2="1184" y2="196" stroke="#bfdbfe" stroke-width="1"/>
    <text x="64" y="216" font-size="13" font-weight="700" fill="#1e3a8a">Step-by-Step Flow:</text>
    <rect x="64" y="218" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="235" text-anchor="middle" font-size="11" font-weight="800" fill="white">1</text>
      <text x="100" y="235" font-size="12" fill="#0f172a">User selects their role from the login page (Student, Faculty, HOD, Admin)</text><rect x="64" y="248" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="265" text-anchor="middle" font-size="11" font-weight="800" fill="white">2</text>
      <text x="100" y="265" font-size="12" fill="#0f172a">User enters their ID and PIN or password</text><rect x="64" y="278" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="295" text-anchor="middle" font-size="11" font-weight="800" fill="white">3</text>
      <text x="100" y="295" font-size="12" fill="#0f172a">Server checks the ID format to determine role: CUPGS/* for students and faculty, HOD/* for HODs</text><rect x="64" y="308" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="325" text-anchor="middle" font-size="11" font-weight="800" fill="white">4</text>
      <text x="100" y="325" font-size="12" fill="#0f172a">PIN is verified against the stored record for that employee or student ID</text><rect x="64" y="338" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="355" text-anchor="middle" font-size="11" font-weight="800" fill="white">5</text>
      <text x="100" y="355" font-size="12" fill="#0f172a">On success, server creates a session; on failure, returns a clear error message</text><rect x="64" y="368" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="385" text-anchor="middle" font-size="11" font-weight="800" fill="white">6</text>
      <text x="100" y="385" font-size="12" fill="#0f172a">Rate limiting blocks IPs after 10 failed attempts within 15 minutes</text><rect x="64" y="398" width="24" height="24" rx="12" fill="#1e3a8a"/>
      <text x="76" y="415" text-anchor="middle" font-size="11" font-weight="800" fill="white">7</text>
      <text x="100" y="415" font-size="12" fill="#0f172a">Session persists until the browser is closed or the user logs out explicitly</text>
    
  <rect x="40" y="494" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="518" font-size="16" font-weight="800" fill="white">5.2. Feedback Submission Module</text>
    <rect x="40" y="534" width="1160" height="358" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="64" y="562" font-size="14" font-weight="700" fill="#14532d">Feedback Submission Module</text>
    <text x="64" y="578" font-size="12" fill="#64748b">Core module — collects, validates, and stores anonymous student feedback.</text>
    <line x1="56" y1="602" x2="1184" y2="602" stroke="#bbf7d0" stroke-width="1"/>
    <text x="64" y="622" font-size="13" font-weight="700" fill="#14532d">Step-by-Step Flow:</text>
    <rect x="64" y="624" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="641" text-anchor="middle" font-size="11" font-weight="800" fill="white">1</text>
      <text x="100" y="641" font-size="12" fill="#0f172a">Student selects their department, then the specific course from a filtered dropdown</text><rect x="64" y="654" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="671" text-anchor="middle" font-size="11" font-weight="800" fill="white">2</text>
      <text x="100" y="671" font-size="12" fill="#0f172a">Faculty is auto-populated from the course record (or shown as 'Faculty TBA' if unassigned)</text><rect x="64" y="684" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="701" text-anchor="middle" font-size="11" font-weight="800" fill="white">3</text>
      <text x="100" y="701" font-size="12" fill="#0f172a">Semester and Academic Year are auto-calculated from the current date</text><rect x="64" y="714" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="731" text-anchor="middle" font-size="11" font-weight="800" fill="white">4</text>
      <text x="100" y="731" font-size="12" fill="#0f172a">Student drags star ratings for 5 categories, each from 0.5 to 5.0 in 0.5 steps</text><rect x="64" y="744" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="761" text-anchor="middle" font-size="11" font-weight="800" fill="white">5</text>
      <text x="100" y="761" font-size="12" fill="#0f172a">Optional text comments can be added for each rating category</text><rect x="64" y="774" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="791" text-anchor="middle" font-size="11" font-weight="800" fill="white">6</text>
      <text x="100" y="791" font-size="12" fill="#0f172a">HOD's custom questions are shown if configured; student fills them out</text><rect x="64" y="804" width="24" height="24" rx="12" fill="#14532d"/>
      <text x="76" y="821" text-anchor="middle" font-size="11" font-weight="800" fill="white">7</text>
      <text x="100" y="821" font-size="12" fill="#0f172a">On submit: server validates inputs, checks window, verifies integrity, stores record, returns Reference ID</text>
    
  <rect x="40" y="900" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="924" font-size="16" font-weight="800" fill="white">5.3. HOD Analytics &amp; Dashboard Module</text>
    <rect x="40" y="940" width="1160" height="358" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="64" y="968" font-size="14" font-weight="700" fill="#065f46">HOD Analytics &amp; Dashboard Module</text>
    <text x="64" y="984" font-size="12" fill="#64748b">HOD's primary tool for real-time department performance analysis and reporting.</text>
    <line x1="56" y1="1008" x2="1184" y2="1008" stroke="#6ee7b7" stroke-width="1"/>
    <text x="64" y="1028" font-size="13" font-weight="700" fill="#065f46">Step-by-Step Flow:</text>
    <rect x="64" y="1030" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1047" text-anchor="middle" font-size="11" font-weight="800" fill="white">1</text>
      <text x="100" y="1047" font-size="12" fill="#0f172a">Dashboard loads with department summary: total feedback received and overall average rating</text><rect x="64" y="1060" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1077" text-anchor="middle" font-size="11" font-weight="800" fill="white">2</text>
      <text x="100" y="1077" font-size="12" fill="#0f172a">Per-course table shows 5-category rating breakdown for every course in the department</text><rect x="64" y="1090" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1107" text-anchor="middle" font-size="11" font-weight="800" fill="white">3</text>
      <text x="100" y="1107" font-size="12" fill="#0f172a">HOD can sort the table by any rating category to identify top or bottom performers</text><rect x="64" y="1120" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1137" text-anchor="middle" font-size="11" font-weight="800" fill="white">4</text>
      <text x="100" y="1137" font-size="12" fill="#0f172a">Trend section shows semester-on-semester comparison for selected courses</text><rect x="64" y="1150" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1167" text-anchor="middle" font-size="11" font-weight="800" fill="white">5</text>
      <text x="100" y="1167" font-size="12" fill="#0f172a">PDF Report button generates a formatted report with college header, all courses, and ratings</text><rect x="64" y="1180" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1197" text-anchor="middle" font-size="11" font-weight="800" fill="white">6</text>
      <text x="100" y="1197" font-size="12" fill="#0f172a">Form Builder section lets HOD add, reorder, or delete custom feedback questions</text><rect x="64" y="1210" width="24" height="24" rx="12" fill="#065f46"/>
      <text x="76" y="1227" text-anchor="middle" font-size="11" font-weight="800" fill="white">7</text>
      <text x="100" y="1227" font-size="12" fill="#0f172a">Window Status panel shows whether a feedback window is currently active, with its dates</text>
    
  <rect x="40" y="1306" width="1160" height="36" rx="4" fill="#1e3a8a"/>
  <text x="56" y="1330" font-size="16" font-weight="800" fill="white">5.4. Admin Institution Management Module</text>
    <rect x="40" y="1346" width="1160" height="358" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="64" y="1374" font-size="14" font-weight="700" fill="#7c2d12">Admin Institution Management Module</text>
    <text x="64" y="1390" font-size="12" fill="#64748b">Admin's complete control panel for institution-wide configuration and oversight.</text>
    <line x1="56" y1="1414" x2="1184" y2="1414" stroke="#fecaca" stroke-width="1"/>
    <text x="64" y="1434" font-size="13" font-weight="700" fill="#7c2d12">Step-by-Step Flow:</text>
    <rect x="64" y="1436" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1453" text-anchor="middle" font-size="11" font-weight="800" fill="white">1</text>
      <text x="100" y="1453" font-size="12" fill="#0f172a">Institution dashboard shows combined analytics summary for all 5 departments</text><rect x="64" y="1466" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1483" text-anchor="middle" font-size="11" font-weight="800" fill="white">2</text>
      <text x="100" y="1483" font-size="12" fill="#0f172a">Highest and lowest rated courses across the institution are highlighted</text><rect x="64" y="1496" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1513" text-anchor="middle" font-size="11" font-weight="800" fill="white">3</text>
      <text x="100" y="1513" font-size="12" fill="#0f172a">Course management: add new courses, assign or reassign faculty, set semester and academic year</text><rect x="64" y="1526" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1543" text-anchor="middle" font-size="11" font-weight="800" fill="white">4</text>
      <text x="100" y="1543" font-size="12" fill="#0f172a">Faculty management: add, edit, or deactivate faculty records with department assignment</text><rect x="64" y="1556" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1573" text-anchor="middle" font-size="11" font-weight="800" fill="white">5</text>
      <text x="100" y="1573" font-size="12" fill="#0f172a">Feedback Window creation: set title, description, start date, end date, and target department</text><rect x="64" y="1586" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1603" text-anchor="middle" font-size="11" font-weight="800" fill="white">6</text>
      <text x="100" y="1603" font-size="12" fill="#0f172a">Window toggle: activate or deactivate any window at any time with a single toggle switch</text><rect x="64" y="1616" width="24" height="24" rx="12" fill="#7c2d12"/>
      <text x="76" y="1633" text-anchor="middle" font-size="11" font-weight="800" fill="white">7</text>
      <text x="100" y="1633" font-size="12" fill="#0f172a">Cross-department comparison shows relative performance of all departments side by side</text>

  <rect x="0" y="1714" width="1240" height="40" fill="#0f172a"/>
  <text x="620" y="1738" text-anchor="middle" font-size="10" fill="#475569">CUPGS Feedback Manager  |  Project Documentation</text>
  <text x="1200" y="1738" text-anchor="end" font-size="10" fill="#475569">6 / 10</text>
</svg>